<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Price Comparison</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:        #FAFAFA;
    --surface:   #FFFFFF;
    --border:    #E8E8E6;
    --spine:     #606663;
    --graphite:  #323935;
    --ash:       #606663;
    --text:      #1A1A1A;
    --muted:     #888B88;
    --green:     #00D64A;
    --blue:      #2471CC;
    --purple:    #746BE6;
    --pink:      #DB33CB;
    --red:       #EC5B5B;
    --input-bg:  #F2F2F0;
    --tag-bg:    #EEEEED;
    --radius:    6px;
    --font:      'DM Sans', 'Helvetica Neue', sans-serif;
    --font-mono: 'DM Mono', 'Courier New', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    min-height: 100vh;
  }

  /* ── Google Fonts ── */
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  /* ── Layout ── */
  .shell {
    display: grid;
    grid-template-columns: 280px 1fr;
    grid-template-rows: 56px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    gap: 12px;
  }

  .header-logo {
    width: 22px;
    height: 22px;
    background: var(--graphite);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .header-logo svg { width: 12px; height: 12px; fill: var(--bg); }

  .header-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--graphite);
    letter-spacing: -0.01em;
  }

  .header-sub {
    font-size: 11px;
    color: var(--muted);
    margin-left: 2px;
  }

  .header-spacer { flex: 1; }

  .header-badge {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    background: var(--tag-bg);
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: 0.02em;
  }

  /* ── Sidebar ── */
  .sidebar {
    border-right: 1px solid var(--border);
    background: var(--bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  /* Search */
  .search-wrap {
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 13px;
    height: 13px;
    stroke: var(--muted);
    fill: none;
  }

  #search {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid transparent;
    border-radius: var(--radius);
    padding: 7px 10px 7px 30px;
    font-family: var(--font);
    font-size: 12px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  #search:focus { border-color: var(--spine); }
  #search::placeholder { color: var(--muted); }

  /* Asset list */
  .asset-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 8px;
  }

  .asset-list::-webkit-scrollbar { width: 4px; }
  .asset-list::-webkit-scrollbar-track { background: transparent; }
  .asset-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .asset-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.1s;
    user-select: none;
  }

  .asset-item:hover { background: var(--tag-bg); }
  .asset-item.selected { background: var(--graphite); }
  .asset-item.selected .asset-sym { color: #fff; }
  .asset-item.selected .asset-name { color: rgba(255,255,255,0.6); }

  .asset-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--border);
  }

  .asset-item.selected .asset-dot { background: var(--green); }

  .asset-sym {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--graphite);
    min-width: 52px;
  }

  .asset-name {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Date controls */
  .date-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }

  .date-field label {
    display: block;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 4px;
    font-weight: 500;
  }

  .date-field input {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid transparent;
    border-radius: var(--radius);
    padding: 6px 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .date-field input:focus { border-color: var(--spine); }

  /* Quick presets */
  .presets {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .preset {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    padding: 4px 8px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.1s;
    letter-spacing: 0.02em;
  }

  .preset:hover { border-color: var(--spine); color: var(--graphite); }
  .preset.active { background: var(--graphite); border-color: var(--graphite); color: #fff; }

  /* Selected tags */
  .selected-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    min-height: 28px;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    padding: 3px 8px 3px 10px;
    border-radius: 20px;
    color: #fff;
    letter-spacing: 0.02em;
  }

  .tag-remove {
    cursor: pointer;
    opacity: 0.7;
    font-size: 12px;
    line-height: 1;
    transition: opacity 0.1s;
  }
  .tag-remove:hover { opacity: 1; }

  /* ── Main area ── */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .chart-header {
    padding: 20px 28px 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .chart-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--graphite);
    letter-spacing: -0.02em;
  }

  .chart-subtitle {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .chart-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: var(--font);
    font-size: 11px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--graphite);
    cursor: pointer;
    transition: all 0.1s;
  }

  .btn:hover { border-color: var(--spine); }
  .btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; }

  .btn-primary {
    background: var(--graphite);
    border-color: var(--graphite);
    color: #fff;
  }
  .btn-primary:hover { background: #1a1f1d; border-color: #1a1f1d; }

  /* Chart canvas area */
  .chart-wrap {
    flex: 1;
    padding: 16px 28px 8px;
    position: relative;
    min-height: 0;
  }

  canvas { display: block; }

  .chart-source {
    padding: 4px 28px 16px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  /* Empty state */
  .empty-state {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    gap: 8px;
    pointer-events: none;
  }

  .empty-state svg {
    width: 32px;
    height: 32px;
    stroke: var(--border);
    fill: none;
  }

  .empty-state p { font-size: 12px; }

  /* Loading */
  .loading {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(250,250,250,0.8);
  }

  .loading.visible { display: flex; }

  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--spine);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Performance legend */
  .perf-row {
    padding: 0 28px 12px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .perf-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
  }

  .perf-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .perf-sym {
    font-family: var(--font-mono);
    font-weight: 500;
    color: var(--graphite);
  }

  .perf-val {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 10px;
  }

  .perf-pos { background: #E8F9EE; color: #0A6E2A; }
  .perf-neg { background: #FDEAEA; color: #9B2020; }
</style>
</head>
<body>

<div class="shell">

  <!-- Header -->
  <header class="header">
    <div class="header-logo">
      <svg viewBox="0 0 12 12"><polyline points="1,9 4,5 7,7 11,2" stroke-width="1.5" stroke="white" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <span class="header-title">Wintermute</span>
    <span class="header-sub">/ Price Comparison</span>
    <div class="header-spacer"></div>
    <span class="header-badge" id="asset-count">— assets</span>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar">

    <!-- Search -->
    <div class="sidebar-section">
      <div class="sidebar-label">Assets</div>
      <div class="search-wrap">
        <svg viewBox="0 0 16 16" stroke-width="1.5" stroke-linecap="round"><circle cx="6.5" cy="6.5" r="4"/><line x1="10" y1="10" x2="14" y2="14"/></svg>
        <input type="text" id="search" placeholder="Search ticker or name…" autocomplete="off">
      </div>
    </div>

    <!-- Asset list -->
    <div class="asset-list" id="asset-list">
      <div style="padding:12px 8px;color:var(--muted);font-size:11px">Loading assets…</div>
    </div>

    <!-- Date range -->
    <div class="sidebar-section">
      <div class="sidebar-label">Date Range</div>
      <div class="date-row">
        <div class="date-field">
          <label>From</label>
          <input type="date" id="date-from">
        </div>
        <div class="date-field">
          <label>To</label>
          <input type="date" id="date-to">
        </div>
      </div>
      <div class="presets">
        <button class="preset" data-days="7">1W</button>
        <button class="preset" data-days="30">1M</button>
        <button class="preset" data-days="90">3M</button>
        <button class="preset active" data-days="180">6M</button>
        <button class="preset" data-days="365">1Y</button>
        <button class="preset" data-days="1095">3Y</button>
        <button class="preset" data-days="0">All</button>
      </div>
    </div>

    <!-- Selected -->
    <div class="sidebar-section" style="flex-shrink:0">
      <div class="sidebar-label">Selected</div>
      <div class="selected-tags" id="selected-tags">
        <span style="color:var(--muted);font-size:11px">None selected</span>
      </div>
    </div>

  </aside>

  <!-- Main -->
  <main class="main">
    <div class="chart-header">
      <div>
        <div class="chart-title" id="chart-title">Select assets to compare</div>
        <div class="chart-subtitle" id="chart-subtitle">Rebased to 100 at period start</div>
      </div>
      <div class="chart-actions">
        <button class="btn" id="btn-save">
          <svg viewBox="0 0 16 16" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 13h10M8 3v7M5 7l3 3 3-3"/></svg>
          Save PNG
        </button>
      </div>
    </div>

    <div class="perf-row" id="perf-row"></div>

    <div class="chart-wrap">
      <canvas id="chart"></canvas>
      <div class="empty-state" id="empty-state">
        <svg viewBox="0 0 32 32" stroke-width="1"><polyline points="2,26 10,16 16,20 22,10 30,14"/><rect x="2" y="2" width="28" height="28" rx="2"/></svg>
        <p>Select assets from the sidebar</p>
      </div>
      <div class="loading" id="loading"><div class="spinner"></div></div>
    </div>

    <div class="chart-source" id="chart-source">Source: CoinGecko Pro — Wintermute OTC</div>
  </main>

</div>

<script>
const PALETTE = ['#00D64A','#2471CC','#746BE6','#DB33CB','#EC5B5B','#F7931A','#26A17B','#FFB800'];

let allAssets    = [];
let selectedSyms = [];
let chart        = null;

// ── Init dates ────────────────────────────────────────────────────────────────
function initDates(days = 180) {
  const to   = new Date();
  const from = new Date();
  from.setDate(from.getDate() - days);
  document.getElementById('date-to').value   = to.toISOString().split('T')[0];
  document.getElementById('date-from').value = from.toISOString().split('T')[0];
}

// ── Load assets ───────────────────────────────────────────────────────────────
async function loadAssets() {
  const res  = await fetch('/api/assets');
  allAssets  = await res.json();
  document.getElementById('asset-count').textContent = `${allAssets.length} assets`;
  renderList(allAssets);
}

function renderList(assets) {
  const el = document.getElementById('asset-list');
  if (!assets.length) {
    el.innerHTML = '<div style="padding:12px 8px;color:var(--muted);font-size:11px">No results</div>';
    return;
  }
  el.innerHTML = assets.map(a => `
    <div class="asset-item ${selectedSyms.includes(a.symbol) ? 'selected' : ''}"
         data-sym="${a.symbol}" onclick="toggleAsset('${a.symbol}')">
      <div class="asset-dot"></div>
      <span class="asset-sym">${a.symbol}</span>
      <span class="asset-name">${a.name || ''}</span>
    </div>
  `).join('');
}

// ── Search ────────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  renderList(allAssets.filter(a =>
    a.symbol.toLowerCase().includes(q) ||
    (a.name || '').toLowerCase().includes(q)
  ));
});

// ── Toggle asset ──────────────────────────────────────────────────────────────
function toggleAsset(sym) {
  if (selectedSyms.includes(sym)) {
    selectedSyms = selectedSyms.filter(s => s !== sym);
  } else {
    if (selectedSyms.length >= 8) {
      selectedSyms.shift(); // max 8
    }
    selectedSyms.push(sym);
  }
  renderTags();
  renderList(document.getElementById('search').value
    ? allAssets.filter(a => {
        const q = document.getElementById('search').value.toLowerCase();
        return a.symbol.toLowerCase().includes(q) || (a.name||'').toLowerCase().includes(q);
      })
    : allAssets
  );
  fetchAndDraw();
}

// ── Tags ──────────────────────────────────────────────────────────────────────
function renderTags() {
  const el = document.getElementById('selected-tags');
  if (!selectedSyms.length) {
    el.innerHTML = '<span style="color:var(--muted);font-size:11px">None selected</span>';
    return;
  }
  el.innerHTML = selectedSyms.map((sym, i) => `
    <span class="tag" style="background:${PALETTE[i % PALETTE.length]}">
      ${sym}
      <span class="tag-remove" onclick="toggleAsset('${sym}')">×</span>
    </span>
  `).join('');
}

// ── Presets ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.preset').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.preset').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const days = parseInt(btn.dataset.days);
    initDates(days === 0 ? 9999 : days);
    fetchAndDraw();
  });
});

document.getElementById('date-from').addEventListener('change', fetchAndDraw);
document.getElementById('date-to').addEventListener('change', fetchAndDraw);

// ── Fetch & draw ──────────────────────────────────────────────────────────────
async function fetchAndDraw() {
  if (!selectedSyms.length) {
    document.getElementById('empty-state').style.display = 'flex';
    document.getElementById('perf-row').innerHTML = '';
    if (chart) { chart.destroy(); chart = null; }
    return;
  }

  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('loading').classList.add('visible');

  const from = document.getElementById('date-from').value;
  const to   = document.getElementById('date-to').value;
  const url  = `/api/price?symbols=${selectedSyms.join(',')}&from=${from}&to=${to}`;

  try {
    const res  = await fetch(url);
    const data = await res.json();
    drawChart(data, from, to);
  } catch(e) {
    console.error(e);
  } finally {
    document.getElementById('loading').classList.remove('visible');
  }
}

function drawChart(data, from, to) {
  const canvas = document.getElementById('chart');

  // Build datasets
  const datasets = selectedSyms
    .filter(sym => data[sym])
    .map((sym, i) => ({
      label:           sym,
      data:            data[sym].rebased,
      borderColor:     PALETTE[i % PALETTE.length],
      backgroundColor: PALETTE[i % PALETTE.length] + '18',
      borderWidth:     1.5,
      pointRadius:     0,
      pointHoverRadius:4,
      tension:         0.1,
      fill:            false,
    }));

  if (chart) { chart.destroy(); chart = null; }

  chart = new Chart(canvas, {
    type: 'line',
    data: { labels: datasets.length ? data[selectedSyms.filter(s=>data[s])[0]].dates : [], datasets },
    options: {
      responsive:          true,
      maintainAspectRatio: false,
      animation:           { duration: 300 },
      interaction:         { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#fff',
          borderColor:     '#E8E8E6',
          borderWidth:     1,
          titleColor:      '#323935',
          bodyColor:       '#606663',
          padding:         10,
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}  ${ctx.parsed.y != null ? ctx.parsed.y.toFixed(2) : '—'}`
          }
        }
      },
      scales: {
        x: {
          type:   'category',
          grid:   { display: false },
          border: { color: '#606663', width: 0.8 },
          ticks:  {
            color: '#606663',
            font:  { family: 'DM Mono', size: 10 },
            maxRotation: 0,
            maxTicksLimit: 8,
            callback: function(val, idx) {
              const label = this.getLabelForValue(val);
              return label ? label.slice(0, 7) : '';
            }
          }
        },
        y: {
          grid:   { display: false },
          border: { color: '#606663', width: 0.8 },
          ticks:  {
            color:    '#606663',
            font:     { family: 'DM Mono', size: 10 },
            callback: v => v.toFixed(0)
          }
        }
      }
    }
  });

  // Chart.js time scale needs adapter
  updatePerfRow(data);
  updateTitle(from, to);
}

function updatePerfRow(data) {
  const el = document.getElementById('perf-row');
  el.innerHTML = selectedSyms.filter(s => data[s]).map((sym, i) => {
    const rebased = data[sym].rebased.filter(v => v != null);
    const ret     = rebased.length ? rebased[rebased.length - 1] - 100 : null;
    const cls     = ret === null ? '' : ret >= 0 ? 'perf-pos' : 'perf-neg';
    const val     = ret === null ? '—' : `${ret >= 0 ? '+' : ''}${ret.toFixed(1)}%`;
    return `
      <div class="perf-item">
        <div class="perf-dot" style="background:${PALETTE[i % PALETTE.length]}"></div>
        <span class="perf-sym">${sym}</span>
        <span class="perf-val ${cls}">${val}</span>
      </div>`;
  }).join('');
}

function updateTitle(from, to) {
  const syms = selectedSyms.join(' · ');
  document.getElementById('chart-title').textContent = syms || 'Select assets';
  document.getElementById('chart-subtitle').textContent =
    `Rebased to 100  ·  ${from} → ${to}`;
}

// ── Save PNG ──────────────────────────────────────────────────────────────────
document.getElementById('btn-save').addEventListener('click', () => {
  if (!chart) return;

  // Draw to offscreen canvas at 12×5 inches @ 150dpi = 1800×750px
  const W = 1800, H = 750;
  const off = document.createElement('canvas');
  off.width  = W;
  off.height = H;
  const ctx = off.getContext('2d');

  // Background
  ctx.fillStyle = '#FAFAFA';
  ctx.fillRect(0, 0, W, H);

  // Copy chart
  ctx.drawImage(chart.canvas, 40, 20, W - 80, H - 80);

  // Source line
  ctx.fillStyle = '#606663';
  ctx.font      = '500 18px DM Mono, monospace';
  ctx.fillText('Source: CoinGecko Pro — Wintermute OTC', 40, H - 20);

  // Download
  const link = document.createElement('a');
  const syms = selectedSyms.join('_');
  const date = new Date().toISOString().split('T')[0];
  link.download = `price_comparison_${syms}_${date}.png`;
  link.href     = off.toDataURL('image/png');
  link.click();
});

// ── Chart.js date adapter (inline, no CDN needed) ─────────────────────────────
// Use built-in time scale with string dates
