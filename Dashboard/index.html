// ── Heatmap helpers ───────────────────────────────────────────────────────────
function heatCorr(v) {
  if (v === null || v === undefined) return 'rgba(60,60,60,0.6)';
  const t = (v + 1) / 2;
  if (t < 0.5) {
    const f = t * 2;
    return `rgb(${Math.round(220)},${Math.round(60 + 195*f)},${Math.round(60 + 195*f)})`;
  } else {
    const f = (t - 0.5) * 2;
    return `rgb(${Math.round(255 - 195*f)},${Math.round(220)},${Math.round(255 - 195*f)})`;
  }
}
function heatFunding(v, maxAbs) {
  if (v === null || v === undefined) return 'rgba(60,60,60,0.6)';
  const t = Math.max(-1, Math.min(1, v / (maxAbs || 0.001)));
  return t > 0
    ? `rgba(236,91,91,${0.15 + 0.85 * t})`
    : `rgba(0,214,74,${0.15 + 0.85 * Math.abs(t)})`;
}
function drawHeatmapCanvas(rowLabels, colLabels, matrix, colorFn) {
  if (chart) { chart.destroy(); chart = null; }
  const box = document.getElementById('chart-box');
  const canvas = document.getElementById('main-chart');
  const W = box.clientWidth  || 600;
  const H = box.clientHeight || 400;
  canvas.width  = W;
  canvas.height = H;
  const cx = canvas.getContext('2d');
  cx.clearRect(0, 0, W, H);
  const nR = rowLabels.length, nC = colLabels.length;
  if (!nR || !nC) return;
  const padL = 120, padT = 60, padB = 10, padR = 10;
  const cellW = (W - padL - padR) / nC;
  const cellH = (H - padT - padB) / nR;
  cx.font = '11px monospace';
  for (let i = 0; i < nR; i++) {
    for (let j = 0; j < nC; j++) {
      const v = Array.isArray(matrix[i]) ? matrix[i][j] : null;
      const x = padL + j * cellW, y = padT + i * cellH;
      cx.fillStyle = colorFn(v, 0.05);
      cx.fillRect(x, y, cellW - 1, cellH - 1);
      if (v !== null && v !== undefined) {
        cx.fillStyle = Math.abs(v) > 0.5 ? '#111' : '#eee';
        cx.textAlign = 'center';
        cx.textBaseline = 'middle';
        cx.fillText(v.toFixed(2), x + cellW / 2, y + cellH / 2);
      }
    }
    cx.fillStyle = '#aaa';
    cx.textAlign = 'right';
    cx.textBaseline = 'middle';
    cx.fillText(rowLabels[i], padL - 4, padT + i * cellH + cellH / 2);
  }
  for (let j = 0; j < nC; j++) {
    cx.save();
    cx.fillStyle = '#aaa';
    cx.font = '11px monospace';
    cx.textAlign = 'right';
    cx.textBaseline = 'middle';
    cx.translate(padL + j * cellW + cellW / 2, padT - 8);
    cx.rotate(-Math.PI / 4);
    cx.fillText(colLabels[j], 0, 0);
    cx.restore();
  }
}

// ── Chart defaults ─────────────────────────────────────────────────────────────
const CDEFAULT = {
  animation: false, responsive: true, maintainAspectRatio: false,
  interaction: { mode: 'index', intersect: false },
};
const XTICK = { color: '#888', font: { family: 'monospace', size: 11 } };
const YTICK = { color: '#888', font: { family: 'monospace', size: 11 } };
const XGRID = { color: 'rgba(255,255,255,0.04)' };
const YGRID = { color: 'rgba(255,255,255,0.04)' };
function spinOn()  { document.getElementById('chart-spin').classList.add('on'); document.getElementById('chart-empty').style.display = 'none'; }
function showErr(e){ document.getElementById('chart-empty').style.display = 'flex'; document.getElementById('empty-msg').textContent = `Error: ${e.message}`; }
function mkChart(type, data, options, plugins) {
  // Clean up control center matrix if present
  const ccEl = document.getElementById('cc-matrix-container');
  const combEl = document.getElementById('combined-chart-container');
  if (combEl) { if (chart?._combinedBot) chart._combinedBot.destroy(); combEl.remove(); }
  if (ccEl) ccEl.remove();
  const mainCanvas = document.getElementById('main-chart');
  if (mainCanvas) mainCanvas.style.display = '';
  if (chart) { chart.destroy(); chart = null; }
  const ctx2 = document.getElementById('main-chart').getContext('2d');
  chart = new Chart(ctx2, { type, data, options: Object.assign({}, CDEFAULT, options), plugins: plugins || [] });
  return chart;
}
function setTitle(t, s) {
  document.getElementById('chart-title').textContent = t;
  if (s) document.getElementById('chart-src').textContent = s;
}
function fmtBig(v) {
  if (v == null) return '—';
  if (Math.abs(v) >= 1e9) return (v/1e9).toFixed(1)+'B';
  if (Math.abs(v) >= 1e6) return (v/1e6).toFixed(0)+'M';
  if (Math.abs(v) >= 1e3) return (v/1e3).toFixed(0)+'K';
  return v.toFixed(0);
}

// ── Category Overview (embedded CC rules per tab) ─────────────────────────────
let _ccDataCache = null;

async function fetchCategoryOverview(category) {
  spinOn();
  try {
    if (!_ccDataCache) {
      _ccDataCache = await fetch('/api/control-center').then(r=>r.json());
    }
    const data = _ccDataCache;
    if (!data.charts?.length) throw new Error('no data');

    if (chart) { chart.destroy(); chart = null; }
    const canvas = document.getElementById('main-chart');
    canvas.style.display = 'none';

    let existing = document.getElementById('cc-matrix-container');
    if (existing) existing.remove();

    const container = document.createElement('div');
    container.id = 'cc-matrix-container';
    container.style.cssText = 'position:absolute;inset:0;overflow-y:auto;padding:16px 20px;';

    // Filter to this category
    const charts = data.charts.filter(c => c.category === category);

    if (!charts.length) {
      container.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60%;gap:12px"><div style="font-size:48px;opacity:0.2">&#10003;</div><div style="font-size:15px;font-weight:500;color:var(--graphite)">All quiet</div><div style="font-size:13px;color:var(--muted)">No rules configured for ' + category + ' yet.</div></div>';
      canvas.parentElement.appendChild(container);
      setTitle(category + ' — Signal Overview', 'Control center rules for ' + category);
      document.getElementById('chart-spin').classList.remove('on');
      return;
    }

    // Group charts by their chart_name prefix to infer groups
    // Build a group column by detecting chart name patterns
    const GROUP_MAP = {
      'Gap': 'Moving Averages', 'moving average': 'Moving Averages', 'Moving': 'Moving Averages',
      'Deviation': 'Moving Averages', 'deviation': 'Moving Averages',
      'Drawdown': 'Price Performance', 'drawdown': 'Price Performance',
      'Volatility': 'Volatility', 'volatility': 'Volatility', 'DVOL': 'Volatility', 'RV vs': 'Volatility',
      'Funding': 'Derivatives', 'funding': 'Derivatives',
      'Dominance': 'Market Cap', 'dominance': 'Market Cap', 'Market Cap': 'Market Cap', 'market cap': 'Market Cap',
      'ETH/BTC': 'Relative', 'Ratio': 'Relative',
    };
    function inferGroup(chartName) {
      for (const [pattern, group] of Object.entries(GROUP_MAP)) {
        if (chartName.includes(pattern)) return group;
      }
      return 'Other';
    }

    // Sort charts by group
    const groupOrder = ['Price Performance', 'Moving Averages', 'Market Cap', 'Volatility', 'Derivatives', 'Relative', 'Other'];
    charts.sort((a, b) => {
      const ga = groupOrder.indexOf(inferGroup(a.chart_name));
      const gb = groupOrder.indexOf(inferGroup(b.chart_name));
      return (ga === -1 ? 99 : ga) - (gb === -1 ? 99 : gb);
    });

    const thStyle = 'text-align:left;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;padding:8px 10px';
    let tableHTML = '<div style="margin-bottom:12px"><span style="font-family:var(--mono);font-size:11px;color:var(--muted)">Last updated: ' + data.updated + '</span></div>';
    tableHTML += '<table style="width:100%;border-collapse:collapse;font-size:13px">';
    tableHTML += '<thead><tr style="border-bottom:1px solid var(--border)">';
    tableHTML += '<th style="' + thStyle + ';width:18%">Chart</th>';
    tableHTML += '<th style="' + thStyle + ';width:18%">What to watch</th>';
    tableHTML += '<th style="' + thStyle + ';width:8%">Type</th>';
    tableHTML += '<th style="' + thStyle + ';width:7%">Weight</th>';
    tableHTML += '<th style="text-align:center;' + thStyle + ';width:5%">Status</th>';
    tableHTML += '<th style="' + thStyle + ';width:22%">Detail</th>';
    tableHTML += '<th style="' + thStyle + ';width:22%">Context</th>';
    tableHTML += '</tr></thead><tbody>';

    let lastGroup = null;
    for (const c of charts) {
      const group = inferGroup(c.chart_name);
      const chartLink = c.chart_key && c.chart_tab
        ? '<a href="#" onclick="selectView(\'' + c.chart_tab + '\',\'' + c.chart_key + '\');return false;" style="color:var(--graphite);text-decoration:none;border-bottom:1px dotted var(--muted);font-weight:500">' + c.chart_name + ' &#8594;</a>'
        : '<span style="color:var(--muted)">' + c.chart_name + '</span>';

      // Group band row
      if (group !== lastGroup) {
        lastGroup = group;
        tableHTML += '<tr><td colspan="7" style="padding:16px 10px 8px;font-size:13px;font-weight:700;color:var(--graphite);letter-spacing:.08em;text-transform:uppercase;text-align:center;border-bottom:1px solid var(--border);background:' + (darkMode ? 'rgba(255,255,255,0.03)' : 'rgba(0,0,0,0.03)') + '">' + group + '</td></tr>';
      }

      for (let ri = 0; ri < c.rules.length; ri++) {
        const r = c.rules[ri];
        const isActive = r.active;
        const bgColor = isActive ? (darkMode ? 'rgba(0,214,74,0.06)' : 'rgba(0,180,60,0.06)') : 'transparent';
        const opacity = isActive ? '1' : '0.4';
        const dot = isActive
          ? '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#00D64A"></span>'
          : '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--border)"></span>';
        const typeTag = r.type ? '<span style="font-size:10px;padding:1px 5px;border-radius:3px;background:' + (darkMode ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.05)') + ';color:var(--muted)">' + r.type + '</span>' : '';
        const weightTag = r.weight === 'major'
          ? '<span style="font-size:10px;font-weight:600;color:var(--graphite)">major</span>'
          : '<span style="font-size:10px;color:var(--muted)">minor</span>';

        tableHTML += '<tr style="border-bottom:0.5px solid var(--border);background:' + bgColor + ';opacity:' + opacity + ';transition:opacity 0.15s" onmouseenter="this.style.opacity=\'1\'" onmouseleave="this.style.opacity=\'' + opacity + '\'">';
        tableHTML += '<td style="padding:8px 10px">' + (ri === 0 ? chartLink : '') + '</td>';
        tableHTML += '<td style="padding:8px 10px;font-weight:' + (isActive ? '600' : '400') + '">' + r.name + '</td>';
        tableHTML += '<td style="padding:8px 10px">' + typeTag + '</td>';
        tableHTML += '<td style="padding:8px 10px">' + weightTag + '</td>';
        tableHTML += '<td style="padding:8px 10px;text-align:center">' + dot + '</td>';
        tableHTML += '<td style="padding:8px 10px;font-family:var(--mono);font-size:12px;color:' + (isActive ? 'var(--graphite)' : 'var(--muted)') + '">' + r.detail + '</td>';
        tableHTML += '<td style="padding:8px 10px;font-size:11px;color:var(--muted);font-style:italic">' + (r.context || '') + '</td>';
        tableHTML += '</tr>';
      }
    }

    tableHTML += '</tbody></table>';
    container.innerHTML = tableHTML;
    canvas.parentElement.appendChild(container);
    setTitle(category + ' — Signal Overview', 'Control center rules for ' + category);
    document.getElementById('chart-spin').classList.remove('on');
  } catch(e) { showErr(e); }
}

async function fetchSectorOverview() {
  spinOn();
  try {
    const data = await fetch('/api/sector-overview').then(r=>r.json());
    if (!data.sectors?.length) throw new Error('no data');

    // Destroy chart, show table
    if (chart) { chart.destroy(); chart = null; }
    const canvas = document.getElementById('main-chart');
    canvas.style.display = 'none';

    let existing = document.getElementById('cc-matrix-container');
    if (existing) existing.remove();

    const container = document.createElement('div');
    container.id = 'cc-matrix-container';
    container.style.cssText = 'position:absolute;inset:0;overflow-y:auto;padding:16px 20px;';

    const fmtM = v => {
      if (v == null) return '—';
      if (v >= 1e12) return '$' + (v/1e12).toFixed(2) + 'T';
      if (v >= 1e9)  return '$' + (v/1e9).toFixed(1) + 'B';
      if (v >= 1e6)  return '$' + (v/1e6).toFixed(0) + 'M';
      return '$' + v.toFixed(0);
    };

    let tableHTML = `
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead>
          <tr style="border-bottom:1px solid var(--border)">
            <th style="text-align:left;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;padding:8px 10px">Sector</th>
            <th style="text-align:right;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;padding:8px 10px">Total Mcap</th>
            <th style="text-align:right;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;padding:8px 10px">Median Mcap</th>
            <th style="text-align:right;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;padding:8px 10px">1M Perf (EW)</th>
            <th style="text-align:center;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;padding:8px 10px"># Assets</th>
            <th style="text-align:left;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;padding:8px 10px">Constituents</th>
          </tr>
        </thead>
        <tbody>`;

    for (const s of data.sectors) {
      const perfColor = s.perf_1m > 0 ? '#00D64A' : (s.perf_1m < 0 ? '#EC5B5B' : 'var(--muted)');
      const perfStr = s.perf_1m != null ? (s.perf_1m > 0 ? '+' : '') + s.perf_1m.toFixed(1) + '%' : '—';
      const constStr = s.constituents?.join(', ');

      tableHTML += `
        <tr style="border-bottom:0.5px solid var(--border)">
          <td style="padding:9px 10px;font-weight:600"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${s.color};margin-right:8px"></span>${s.name}</td>
          <td style="padding:9px 10px;text-align:right;font-family:var(--mono);font-size:12px">${fmtM(s.total_mcap)}</td>
          <td style="padding:9px 10px;text-align:right;font-family:var(--mono);font-size:12px">${fmtM(s.median_mcap)}</td>
          <td style="padding:9px 10px;text-align:right;font-family:var(--mono);font-size:12px;color:${perfColor}">${perfStr}</td>
          <td style="padding:9px 10px;text-align:center;font-family:var(--mono);font-size:12px">${s.count}</td>
          <td style="padding:9px 10px;font-size:11px;color:var(--muted)">${constStr}</td>
        </tr>`;
    }

    tableHTML += '</tbody></table>';
    container.innerHTML = tableHTML;
    canvas.parentElement.appendChild(container);
    setTitle('Sector Overview', 'Source: CoinGecko Pro — Wintermute OTC');
    document.getElementById('chart-spin').classList.remove('on');
  } catch(e) { showErr(e); }
}

// ── Alt: Drawdown Over Time ───────────────────────────────────────────────────
async function fetchAltDrawdownTS(from, to) {
  spinOn();
  try {
    const topN = parseInt(document.getElementById('rp-topn')?.value || '10');
    const data = await fetch(`/api/alt-drawdown-ts?from=${from}&to=${to}&topn=${topN}`).then(r=>r.json());
    if (!data.series || !Object.keys(data.series).length) throw new Error('no data');

    const syms = Object.keys(data.series).slice(0, 10);
    const datasets = syms.map((sym, i) => {
      const s = data.series[sym];
      const dateMap = {};
      s.dates.forEach((d, j) => dateMap[d] = s.drawdowns[j]);
      return {
        label: sym,
        data: data.dates.map(d => dateMap[d] !== undefined ? dateMap[d] : null),
        borderColor: PAL[i % PAL.length],
        backgroundColor: 'transparent',
        borderWidth: 1.4,
        pointRadius: 0,
        tension: 0.1,
        spanGaps: true,
      };
    });

    mkChart('line', {
      labels: data.dates,
      datasets,
    }, {
      scales: {
        x: {
          type: 'category',
          ticks: { ...XTICK, maxRotation: 0, maxTicksLimit: 8,
            callback: function(val) { const l = this.getLabelForValue(val); return l ? l.slice(0,7) : ''; } },
          grid: XGRID,
        },
        y: {
          max: 0,
          ticks: { ...YTICK, callback: v => v + '%' },
          grid: YGRID,
        },
      },
      plugins: {
        legend: { display: true, labels: { color: '#888', font: { size: 11 }, boxWidth: 12 } },
        tooltip: {
          callbacks: {
            label: ctx => {
              const v = ctx.parsed.y;
              return v != null ? ` ${ctx.dataset.label}  ${v.toFixed(1)}%` : null;
            }
          }
        }
      },
    });
    setTitle(`Altcoin Drawdown from Running ATH (Top ${syms.length})`, 'Source: CoinGecko · running all-time high');
  } catch(e) { showErr(e); }
}

// ── Alt: Funding Heatmap ──────────────────────────────────────────────────────
async function fetchAltFundingHeatmap(symbols, from, to) {
  spinOn();
  try {
    const syms = symbols.join(',');
    const data = await fetch(`/api/alt-funding-heatmap?symbols=${encodeURIComponent(syms)}&from=${from}&to=${to}`).then(r=>r.json());
    if (data.error) throw new Error(data.error);
    if (!data.symbols?.length) throw new Error('no data');
    const maxAbs = Math.max(...data.symbols.flatMap(s => (data.matrix[s]||[]).filter(v=>v!=null).map(Math.abs)), 0.001);
    const matrix = data.symbols.map(s => data.matrix[s] || []);
    drawHeatmapCanvas(data.symbols, data.dates, matrix, (v) => heatFunding(v, maxAbs));
    setTitle('Altcoin Funding Rate Heatmap', 'Source: Binance/Bybit · 8h avg');
  } catch(e) { showErr(e); }
}
