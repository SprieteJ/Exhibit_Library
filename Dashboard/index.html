<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg:       #FAFAFA;
  --logo-color: #000000;
  --surface:  #FFFFFF;
  --border:   #E4E4E2;
  --spine:    #606663;
  --graphite: #323935;
  --muted:    #888B88;
  --input-bg: #F0F0EE;
  --tag-bg:   #EAEAE8;
  --font:     'DM Sans', 'Helvetica Neue', sans-serif;
  --mono:     'DM Mono', 'Courier New', monospace;
  --radius:   6px;
  --side-w:   268px;
}

[data-theme="dark"] {
  --bg:       #0F1110;
  --logo-color: #FAFAFA;
  --surface:  #1A1D1B;
  --border:   #2A2D2B;
  --spine:    #606663;
  --graphite: #E8EAE8;
  --muted:    #666968;
  --input-bg: #1E221F;
  --tag-bg:   #1E221F;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--graphite);
  font-family: var(--font);
  font-size: 16px;
  height: 100vh;
  overflow: hidden;
  display: grid;
  grid-template-rows: 52px 40px 1fr;
  grid-template-columns: var(--side-w) 1fr var(--side-w);
}

/* ── Top header row ── */
.header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
  background: var(--bg);
}

.logo-mark {
  width: 26px; height: 26px;
  background: var(--graphite);
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.logo-mark svg { width: 14px; height: 14px; }

.logo-name {
  font-size: 14px; font-weight: 600;
  color: var(--graphite); letter-spacing: -0.02em;
  flex-shrink: 0;
}

.header-divider { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }
.header-spacer  { flex: 1; }

.header-pill {
  font-family: var(--mono); font-size: 11px;
  color: var(--muted); background: var(--tag-bg);
  padding: 4px 10px; border-radius: 20px;
}

/* Dark mode toggle */
.dark-toggle {
  width: 32px; height: 32px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.dark-toggle:hover { border-color: var(--spine); color: var(--graphite); }
.dark-toggle svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; }

/* ── Tab bar row ── */
.tabbar {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  gap: 2px;
}

.tab {
  padding: 0 14px;
  height: 40px;
  display: flex; align-items: center;
  font-size: 13px; font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  white-space: nowrap;
  background: none; border-top: none; border-left: none; border-right: none;
  font-family: var(--font);
}

.tab:hover { color: var(--graphite); }
.tab.active { color: var(--graphite); border-bottom-color: var(--graphite); }

.tab-spacer { flex: 1; }

/* Granularity + align toggles in tabbar */
.toggle-group {
  display: flex; gap: 3px;
  align-items: center;
}

.tgl-btn {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  padding: 4px 10px; border-radius: 20px;
  border: 1px solid var(--border); background: none;
  color: var(--muted); cursor: pointer; transition: all 0.12s;
}
.tgl-btn:hover { border-color: var(--spine); color: var(--graphite); }
.tgl-btn.active { background: var(--graphite); border-color: var(--graphite); color: #fff; }
[data-theme="dark"] .tgl-btn.active { background: #E8EAE8; color: #0F1110; }

.tgl-sep { width: 1px; height: 16px; background: var(--border); margin: 0 4px; }

/* ── Content row ── */
/* Left panel */
.left-panel {
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  background: var(--bg);
}

.panel-hdr {
  padding: 12px 16px 8px;
  border-bottom: 1px solid var(--border);
  font-size: 11px; font-weight: 600;
  color: var(--muted); letter-spacing: 0.07em;
  text-transform: uppercase; flex-shrink: 0;
}

.view-tree { flex: 1; overflow-y: auto; padding: 4px 0; }
.view-tree::-webkit-scrollbar { width: 3px; }
.view-tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.tree-group { margin-bottom: 2px; }

.tree-grp-hdr {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 16px; font-size: 13px; font-weight: 500;
  color: var(--muted); cursor: pointer; user-select: none;
  transition: color 0.1s;
}
.tree-grp-hdr:hover { color: var(--graphite); }

.chevron {
  width: 13px; height: 13px;
  stroke: currentColor; fill: none; stroke-width: 2;
  stroke-linecap: round; stroke-linejoin: round;
  transition: transform 0.15s; flex-shrink: 0;
}
.tree-group.open .chevron { transform: rotate(90deg); }
.tree-children { display: none; }
.tree-group.open .tree-children { display: block; }

.tree-leaf {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 16px 7px 34px;
  font-size: 14px; color: var(--muted); cursor: pointer;
  border-left: 2px solid transparent; transition: all 0.1s;
}
.tree-leaf:hover { color: var(--graphite); background: var(--tag-bg); }
.tree-leaf.active { color: var(--graphite); border-left-color: var(--graphite); background: var(--tag-bg); font-weight: 500; }

.tree-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
.tree-leaf.active .tree-dot { background: #00D64A; }

/* Main chart */
.main {
  display: flex; flex-direction: column; overflow: hidden; min-width: 0;
  background: var(--bg);
}

.chart-hdr {
  padding: 16px 22px 0;
  display: flex; align-items: flex-start; justify-content: space-between; flex-shrink: 0;
}
.chart-title { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }
.chart-sub   { font-size: 13px; color: var(--muted); margin-top: 3px; }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font); font-size: 13px; font-weight: 500;
  padding: 7px 14px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--surface);
  color: var(--graphite); cursor: pointer; transition: all 0.1s; white-space: nowrap;
}
.btn:hover { border-color: var(--spine); }
.btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

.perf-row { padding: 10px 22px 2px; display: flex; gap: 12px; flex-wrap: wrap; min-height: 30px; flex-shrink: 0; }
.perf-item { display: flex; align-items: center; gap: 5px; }
.perf-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.perf-sym  { font-family: var(--mono); font-size: 13px; font-weight: 500; }
.perf-val  { font-family: var(--mono); font-size: 12px; padding: 2px 7px; border-radius: 10px; }
.pos { background: #E6F9EE; color: #0A6E2A; }
.neg { background: #FDEAEA; color: #9B2020; }
.neu { background: var(--tag-bg); color: var(--muted); }
[data-theme="dark"] .pos { background: #0A2E15; color: #4AE07A; }
[data-theme="dark"] .neg { background: #2E0A0A; color: #E07A7A; }

.chart-area { flex: 1; padding: 4px 22px 0; position: relative; min-height: 0; }
canvas { display: block; width: 100% !important; height: 100% !important; }

.empty {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: var(--muted); gap: 10px;
}
.empty svg { width: 30px; height: 30px; stroke: var(--border); fill: none; stroke-width: 1; }
.empty p { font-size: 14px; }

.spinner-wrap {
  position: absolute; inset: 0; display: none;
  align-items: center; justify-content: center;
  background: color-mix(in srgb, var(--bg) 85%, transparent);
}
.spinner-wrap.on { display: flex; }
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border); border-top-color: var(--spine);
  border-radius: 50%; animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.chart-src {
  padding: 5px 22px 12px;
  font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.06em; flex-shrink: 0;
}
.chart-info {
  padding: 4px 22px 14px;
  font-family: var(--mono); font-size: 11px; color: var(--muted); line-height: 1.7; flex-shrink: 0;
  border-top: 1px solid var(--border); margin-top: 2px; display: none;
}

/* Right panel */
.right-panel {
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  background: var(--bg);
}

.rp-block { padding: 12px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.rp-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 7px; }

.search-wrap { position: relative; }
.search-wrap svg {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px; stroke: var(--muted); fill: none; stroke-width: 1.5; pointer-events: none;
}

input[type=text] {
  width: 100%; background: var(--input-bg); border: 1px solid transparent;
  border-radius: var(--radius); padding: 8px 10px 8px 32px;
  font-family: var(--font); font-size: 14px; color: var(--graphite);
  outline: none; transition: border-color 0.15s;
}
input[type=text]:focus { border-color: var(--spine); }
input[type=text]::placeholder { color: var(--muted); }

input[type=date], input[type=number] {
  width: 100%; background: var(--input-bg); border: 1px solid transparent;
  border-radius: var(--radius); padding: 7px 9px;
  font-family: var(--mono); font-size: 13px; color: var(--graphite);
  outline: none; transition: border-color 0.15s;
}
input[type=date]:focus, input[type=number]:focus { border-color: var(--spine); }

.date-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
.date-grid label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 3px; }

.presets { display: flex; gap: 3px; flex-wrap: wrap; }
.preset {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  padding: 4px 9px; border-radius: 20px; border: 1px solid var(--border);
  background: none; color: var(--muted); cursor: pointer; transition: all 0.12s;
}
.preset:hover { border-color: var(--spine); color: var(--graphite); }
.preset.active { background: var(--graphite); border-color: var(--graphite); color: var(--bg); }

.window-row { display: flex; align-items: center; gap: 8px; }
.window-row label { font-size: 13px; color: var(--muted); white-space: nowrap; }
input[type=number] { width: 70px; }

.versus-row { display: flex; gap: 6px; }
.versus-btn {
  flex: 1; padding: 6px 0; border-radius: var(--radius);
  border: 1px solid var(--border); background: none;
  font-family: var(--mono); font-size: 12px; font-weight: 500;
  color: var(--muted); cursor: pointer; transition: all 0.12s; text-align: center;
}
.versus-btn:hover { border-color: var(--spine); color: var(--graphite); }
.versus-btn.active { background: var(--graphite); border-color: var(--graphite); color: var(--bg); }

.tags { display: flex; flex-wrap: wrap; gap: 4px; min-height: 26px; }
.tag {
  display: inline-flex; align-items: center; gap: 3px;
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  padding: 3px 8px 3px 9px; border-radius: 20px; color: #fff;
}
.tag-x { cursor: pointer; opacity: 0.7; font-size: 14px; line-height: 1; }
.tag-x:hover { opacity: 1; }

.rp-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
.rp-list::-webkit-scrollbar { width: 3px; }
.rp-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.list-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; border-radius: var(--radius); cursor: pointer; transition: background 0.1s;
}
.list-item:hover { background: var(--tag-bg); }
.list-item.active { background: var(--graphite); }
.list-item.active .item-sym,
.list-item.active .item-name,
.list-item.active .item-count { color: var(--bg) !important; }
.list-item.active .item-dot { background: #00D64A !important; }

.item-dot  { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
.item-sym  { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--graphite); min-width: 60px; }
.item-name { font-size: 13px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.item-count { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-left: auto; flex-shrink: 0; }

/* Equity placeholder */
.coming-soon {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--muted); gap: 12px; padding: 40px;
}
.coming-soon svg { width: 40px; height: 40px; stroke: var(--border); fill: none; stroke-width: 1; }
.coming-soon h3 { font-size: 16px; font-weight: 500; color: var(--graphite); }
.coming-soon p { font-size: 14px; text-align: center; line-height: 1.6; max-width: 280px; }
</style>
</head>

<!-- Header -->

      <!-- outer diamond -->
      <polygon points="20,2 36,14 20,38 4,14"/>
      <!-- inner facets -->
      <line x1="4"  y1="14" x2="20" y2="20"/>
      <line x1="36" y1="14" x2="20" y2="20"/>
      <line x1="20" y1="2"  x2="20" y2="20"/>
      <line x1="20" y1="20" x2="20" y2="38"/>
      <!-- mid horizontal -->
      <line x1="4"  y1="14" x2="36" y2="14"/>
      <!-- left inner triangle -->
      <line x1="4"  y1="14" x2="12" y2="26"/>
      <line x1="20" y1="20" x2="12" y2="26"/>

      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>

<div class="tabbar">
  <button class="tab active" data-tab="control_center">Control Center</button>

  <button class="tab" data-tab="ethereum">Ethereum</button>

    <button class="tgl-btn" data-align="common" id="align-common">Common start</button>

</div>

<!-- Content -->

  <div class="panel-hdr">Views</div>
  <div class="view-tree" id="view-tree"></div>
</aside>

<main class="main">
  <div class="chart-hdr">

// ── Dark mode ─────────────────────────────────────────────────────────────────
document.getElementById('dark-toggle').addEventListener('click', () => {
  darkMode = !darkMode;
  document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
  if (chart) {
    updateChartTheme();
    chart.update();
  }
});

function themeColor() {
  return darkMode ? '#E8EAE8' : '#323935';
}

function updateChartTheme() {
  if (!chart) return;
  const tc = darkMode ? '#E8EAE8' : '#606663';
  chart.options.scales.x.ticks.color   = tc;
  chart.options.scales.x.border.color  = tc;
  chart.options.scales.y.ticks.color   = tc;
  chart.options.scales.y.border.color  = tc;
  chart.options.plugins.tooltip.backgroundColor = darkMode ? '#1A1D1B' : '#fff';
  chart.options.plugins.tooltip.titleColor       = darkMode ? '#E8EAE8' : '#323935';
  chart.options.plugins.tooltip.bodyColor        = darkMode ? '#888B88' : '#606663';
  chart.options.plugins.tooltip.borderColor      = darkMode ? '#2A2D2B' : '#E4E4E2';
}

// ── Log scale ────────────────────────────────────────────────────────────────
document.getElementById('btn-log')?.addEventListener('click', () => {
  logScale = !logScale;
  document.getElementById('btn-log').style.background = logScale ? 'var(--graphite)' : '';
  document.getElementById('btn-log').style.color      = logScale ? 'var(--bg)'       : '';
  document.getElementById('btn-log').style.borderColor= logScale ? 'var(--graphite)' : '';
  if (chart && chart.options.scales.y) {
    chart.options.scales.y.type = logScale ? 'logarithmic' : 'linear';
    chart.update();
  }
});


// ── Chart Search ──────────────────────────────────────────────────────────────
(function() {
  const searchEl = document.getElementById('chart-search');
  if (!searchEl) return;

  searchEl.addEventListener('input', function() {
    const q = this.value.toLowerCase().trim();
    let dropdown = document.getElementById('search-results');

    if (!q) {
      if (dropdown) dropdown.remove();
      return;
    }

    const matches = [];
    for (const [tabKey, tabDef] of Object.entries(TABS)) {
      for (const group of (tabDef.groups || [])) {
        for (const view of (group.children || [])) {
          const haystack = (view.label + ' ' + (view.sub || '') + ' ' + tabDef.label + ' ' + group.label).toLowerCase();
          if (haystack.includes(q)) {
            matches.push({ tab: tabKey, tabLabel: tabDef.label, group: group.label, key: view.key, label: view.label });
          }
        }
      }
    }

    if (!dropdown) {
      dropdown = document.createElement('div');
      dropdown.id = 'search-results';
      dropdown.style.cssText = 'position:absolute;top:100%;left:0;right:0;max-height:400px;overflow-y:auto;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,0.15);z-index:999;margin-top:4px;min-width:280px';
      this.parentElement.appendChild(dropdown);
    }

    if (!matches.length) {
      dropdown.innerHTML = '<div style="padding:12px;font-size:12px;color:var(--muted)">No charts found</div>';
      return;
    }

    dropdown.innerHTML = '';
    matches.slice(0, 15).forEach(function(m) {
      const row = document.createElement('div');
      row.style.cssText = 'padding:8px 12px;cursor:pointer;border-bottom:0.5px solid var(--border);transition:background 0.1s';
      row.innerHTML = '<div style="font-size:12px;font-weight:600;color:var(--graphite)">' + m.label + '</div><div style="font-size:10px;color:var(--muted)">' + m.tabLabel + ' &rsaquo; ' + m.group + '</div>';
      row.addEventListener('mouseenter', function() { this.style.background = 'var(--hover)'; });
      row.addEventListener('mouseleave', function() { this.style.background = ''; });
      row.addEventListener('click', function() {
        selectView(m.tab, m.key);
        searchEl.value = '';

const RULE_HISTORY_CHARTS = ['btc-dom-ma','btc-funding','eth-btc-ratio','am-intracorr'];
let _ruleHistoryData = null;
let _ruleToggles = {};  // {ruleName: true/false}

async function loadRuleOverlay(chartKey, from, to) {
  // Check if this chart has rule history
  if (!RULE_HISTORY_CHARTS.includes(chartKey)) {
    document.getElementById('rule-toggles')?.remove();
    return;
  }

  try {
    const data = await fetch(`/api/rule-history?chart_key=${chartKey}&from=${from}&to=${to}`, {signal: _navAbort?.signal}).then(r=>r.json());
    if (!data?.rules?.length) return;
    _ruleHistoryData = data;

    // Initialize toggles (all on by default)
    _ruleToggles = {};
    for (const r of data.rules) {
      _ruleToggles[r.name] = true;
    }

    // Build toggle buttons
    renderRuleToggles(data.rules);

    // Apply overlay to current chart
    applyRuleZones();
  } catch(e) {
    if (e.name === 'AbortError') return;
  }
}

function renderRuleToggles(rules) {
  let container = document.getElementById('rule-toggles');
  if (!container) {
    container = document.createElement('div');
    container.id = 'rule-toggles';
    container.style.cssText = 'padding:8px 0;display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;border-top:0.5px solid var(--border)';
    // Insert after the chart container
    const chartWrap = document.getElementById('main-chart')?.parentElement;
    if (chartWrap) chartWrap.appendChild(container);
  }

  container.innerHTML = '<span style="font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:4px 0;margin-right:4px">Rules</span>';

  for (const r of rules) {
    const isOn = _ruleToggles[r.name];
    const wt = r.weight === 'major' ? '600' : '400';
    const btn = document.createElement('button');
    btn.style.cssText = `font-size:11px;font-weight:${wt};padding:3px 10px;border-radius:12px;border:1px solid ${isOn ? (darkMode ? 'rgba(0,214,74,0.4)' : 'rgba(0,180,60,0.4)') : 'var(--border)'};background:${isOn ? (darkMode ? 'rgba(0,214,74,0.08)' : 'rgba(0,180,60,0.06)') : 'transparent'};color:${isOn ? (darkMode ? '#5DCAA5' : '#059669') : 'var(--muted)'};cursor:pointer;transition:all 0.15s`;
    btn.textContent = r.name;
    btn.addEventListener('click', function() {
      _ruleToggles[r.name] = !_ruleToggles[r.name];
      renderRuleToggles(rules);
      applyRuleZones();
    });
    container.appendChild(btn);
  }

  // Add "majority" mode button
  const majBtn = document.createElement('button');
  const allOn = Object.values(_ruleToggles).every(v => v);
  majBtn.style.cssText = `font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;border:1px solid ${allOn ? (darkMode ? 'rgba(127,178,241,0.4)' : 'rgba(37,107,204,0.4)') : 'var(--border)'};background:${allOn ? (darkMode ? 'rgba(127,178,241,0.08)' : 'rgba(37,107,204,0.06)') : 'transparent'};color:${allOn ? (darkMode ? '#7Fb2F1' : '#2471CC') : 'var(--muted)'};cursor:pointer;margin-left:auto`;
  majBtn.textContent = allOn ? '● majority' : '○ majority';
  majBtn.addEventListener('click', function() {
    const newState = !allOn;
    for (const key of Object.keys(_ruleToggles)) _ruleToggles[key] = newState;
    renderRuleToggles(rules);
    applyRuleZones();
  });
  container.appendChild(majBtn);
}

function applyRuleZones() {
  if (!chart || !_ruleHistoryData?.rules?.length) return;

  // Remove existing zone annotations
  if (chart.options.plugins.annotation) {
    chart.options.plugins.annotation.annotations = {};
  }

  const rules = _ruleHistoryData.rules;
  const activeRules = rules.filter(r => _ruleToggles[r.name]);
  if (!activeRules.length) { chart.update('none'); return; }

  // Get chart labels (dates)
  const chartLabels = chart.data.labels || [];
  if (!chartLabels.length) return;

  // Determine green zones: majority of active (toggled-on) rules agree
  // Build a date->score map
  const dateScores = {};
  const threshold = activeRules.length <= 2 ? 1 : Math.ceil(activeRules.length / 2);

  for (const rule of activeRules) {
    const dateMap = {};
    rule.dates.forEach((d, i) => dateMap[d] = rule.active[i]);
    for (const d of chartLabels) {
      if (!(d in dateScores)) dateScores[d] = 0;
      if (dateMap[d]) dateScores[d]++;
    }
  }

  // Find contiguous green zones
  const zones = [];
  let zoneStart = null;
  for (let i = 0; i < chartLabels.length; i++) {
    const d = chartLabels[i];
    const isGreen = (dateScores[d] || 0) >= threshold;
    if (isGreen && zoneStart === null) {
      zoneStart = i;
    } else if (!isGreen && zoneStart !== null) {
      zones.push([zoneStart, i - 1]);
      zoneStart = null;
    }
  }
  if (zoneStart !== null) zones.push([zoneStart, chartLabels.length - 1]);

  // Apply as background color segments using the Chart.js dataset approach
  // We'll use a custom plugin for background rectangles
  const greenColor = darkMode ? 'rgba(0,214,74,0.06)' : 'rgba(0,180,60,0.06)';

  // Store zones on chart for the plugin to read
  chart._ruleZones = zones;
  chart._ruleZoneColor = greenColor;

  chart.update('none');
}

// Chart.js plugin to draw rule zone backgrounds
const ruleZonePlugin = {
  id: 'ruleZones',
  beforeDraw(chart) {
    if (!chart._ruleZones?.length) return;
    const ctx = chart.ctx;
    const xScale = chart.scales.x;
    const yScale = chart.scales.y;
    if (!xScale || !yScale) return;

    ctx.save();
    ctx.fillStyle = chart._ruleZoneColor || 'rgba(0,214,74,0.06)';

    for (const [startIdx, endIdx] of chart._ruleZones) {
      const x1 = xScale.getPixelForValue(startIdx);
      const x2 = xScale.getPixelForValue(endIdx);
      const y1 = yScale.top;
      const y2 = yScale.bottom;
      ctx.fillRect(x1, y1, x2 - x1, y2 - y1);
    }

    ctx.restore();
  }
};

// ── Render list ───────────────────────────────────────────────────────────────
function renderRPList(q = '') {
  const el = document.getElementById('rp-list');
  if (!el) return;

  const items = q
    ? allItems.filter(a => (a.symbol||a.name||'').toLowerCase().includes(q) || (a.name||'').toLowerCase().includes(q))
    : allItems;

  if (activeView?.tab === 'baskets') {
    el.innerHTML = items.map(s => `
      <div class="list-item ${selected.includes(s.name) ? 'active' : ''}" onclick="toggleItem('${s.name}')">
        <div class="item-dot" style="${!selected.includes(s.name) ? `background:${s.color}30;border:1px solid ${s.color}` : ''}"></div>
        <span class="item-sym" style="min-width:90px">${s.name}</span>
        <span class="item-count">${s.count}</span>
      </div>`).join('');
  } else {
    el.innerHTML = items.map(a => `
      <div class="list-item ${selected.includes(a.symbol) ? 'active' : ''}" onclick="toggleItem('${a.symbol}')">
        <div class="item-dot"></div>
        <span class="item-sym">${a.symbol}</span>
        <span class="item-name">${a.name || ''}</span>
      </div>`).join('');
  }
}

function toggleItem(name) {
  if (selected.includes(name)) {
    selected = selected.filter(s => s !== name);
  } else {
    if (selected.length >= 8) selected.shift();
    selected.push(name);
  }
  renderTags();
  renderRPList(document.getElementById('rp-search')?.value?.toLowerCase() || '');
  fetchCurrent();
}

function renderTags() {
  const el = document.getElementById('rp-tags');
  if (!el) return;
  if (!selected.length) {
    el.innerHTML = '<span style="color:var(--muted);font-size:13px">None</span>';
    return;
  }
  el.innerHTML = selected.map((s, i) => {
    const col = activeView?.tab === 'baskets' ? (SECTOR_COLORS[s] || PAL[i%PAL.length]) : PAL[i%PAL.length];
    return `<span class="tag" style="background:${col}">${s}<span class="tag-x" onclick="toggleItem('${s}')">×</span></span>`;
  }).join('');
}

// ── Date helpers ──────────────────────────────────────────────────────────────
function initDates(fromId, toId, days) {
  // Anchor to DB latest date if available, otherwise today
  const to   = dbLatestDate ? new Date(dbLatestDate + 'T00:00:00') : new Date();
  const from = new Date(to);
  if (days > 0) from.setDate(from.getDate() - days);
  else from.setFullYear(2013);
  // Cap hourly at 90 days
  if (granularity === 'hourly') {
    const cap = new Date(to); cap.setDate(cap.getDate() - 90);
    if (from < cap) from.setTime(cap.getTime());
  }
  document.getElementById(toId).value   = to.toISOString().split('T')[0];
  document.getElementById(fromId).value = from.toISOString().split('T')[0];
}

function initPresets() {
  document.querySelectorAll('#rp-presets .preset').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#rp-presets .preset').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      initDates('rp-from', 'rp-to', parseInt(btn.dataset.days));
      fetchCurrent();
    });
  });
  document.getElementById('rp-from')?.addEventListener('change', fetchCurrent);
  document.getElementById('rp-to')?.addEventListener('change', fetchCurrent);
}

function setVersus(v) {
  document.querySelectorAll('.versus-btn').forEach(b => b.classList.toggle('active', b.dataset.v === v));
  fetchCurrent();
}

function setRRGGran(val, btn) {
  btn.closest('.versus-row').querySelectorAll('.versus-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  rrgGran = val;
  fetchCurrent();
}

function setRRGBenchmark(val, btn) {
  btn.closest('.versus-row').querySelectorAll('.versus-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  rrgBenchmark = val;
  fetchCurrent();
}

// ── Y-axis formatter ──────────────────────────────────────────────────────────
function yAxisFormatter(v, isCorr, isMom, isZscore, isMcap) {
  if (isCorr)   return v.toFixed(2);
  if (isZscore) return `${v.toFixed(1)}σ`;
  if (isMom)    return `${v >= 0 ? '+' : ''}${v.toFixed(0)}%`;
  if (isMcap)   { if (v >= 1e9) return `$${(v/1e9).toFixed(0)}B`; if (v >= 1e6) return `$${(v/1e6).toFixed(0)}M`; return `$${v.toFixed(0)}`; }
  const delta = v - 100;
  if (Math.abs(delta) < 200) return `${delta >= 0 ? '+' : ''}${delta.toFixed(0)}%`;
  return `${(v/100).toFixed(1)}x`;
}

// ── Chart ─────────────────────────────────────────────────────────────────────
function getOrMakeChart(isCorr = false, isMom = false, isZscore = false, isMcap = false) {
  if (chart) return chart;
  const tc = darkMode ? '#E8EAE8' : '#606663';
  chart = new Chart(document.getElementById('main-chart'), {
    type: 'line',
    data: { labels: [], datasets: [] },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: { duration: 250 },
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: darkMode ? '#1A1D1B' : '#fff',
          borderColor: darkMode ? '#2A2D2B' : '#E4E4E2',
          borderWidth: 1,
          titleColor: darkMode ? '#E8EAE8' : '#323935',
          bodyColor:  darkMode ? '#888B88' : '#606663',
          padding: 12,
          callbacks: {
            label: ctx => {
              const v = ctx.parsed.y;
              if (v == null)    return ` ${ctx.dataset.label}  —`;
              if (isCorr)       return ` ${ctx.dataset.label}  ${v.toFixed(3)}`;
              if (isZscore)     return ` ${ctx.dataset.label}  ${v.toFixed(2)}σ`;
              if (isMom)        return ` ${ctx.dataset.label}  ${v >= 0 ? '+' : ''}${v.toFixed(1)}%`;
              if (isMcap)       { const f = v >= 1e9 ? `$${(v/1e9).toFixed(1)}B` : v >= 1e6 ? `$${(v/1e6).toFixed(0)}M` : `$${v.toFixed(0)}`; return ` ${ctx.dataset.label}  ${f}`; }
              const delta = v - 100;
              const pct = `${delta >= 0 ? '+' : ''}${delta.toFixed(1)}%`;
              return ` ${ctx.dataset.label}  ${pct}`;
            }
          }
        }
      },
      scales: {
        x: {
          type: 'category', grid: { display: false },
          border: { color: tc, width: 0.8 },
          ticks: {
            color: tc, font: { family: 'DM Mono, monospace', size: 11 },
            maxRotation: 0, maxTicksLimit: 8,
            callback: function(val, idx, ticks) {
              const l = this.getLabelForValue(val);
              if (!l) return '';
              return granularity === 'hourly' ? l.slice(0,10) : l.slice(0,7);
            },
            autoSkip: true,
            autoSkipPadding: 20
          }
        },
        y: {
          grid: (isMom || isZscore || isCorr) ? { color: tc + '22', drawBorder: false, lineWidth: 0.5 } : { display: false },
          border: { color: tc, width: 0.8 },
          ticks: {
            color: tc, font: { family: 'DM Mono, monospace', size: 11 },
            callback: v => yAxisFormatter(v, isCorr, isMom, isZscore, isMcap)
          }
        }
      }
    }
  });
  return chart;
}

function drawChart(data, keys, isCorr = false, isMom = false, isZscore = false, isMcap = false) {
  const firstKey = keys.find(k => data[k]);
  if (!firstKey) return;

  if (chart) { chart.destroy(); chart = null; }
  const c = getOrMakeChart(isCorr, isMom, isZscore, isMcap);
  c.data.labels   = data[firstKey].dates;
  c.data.datasets = keys.filter(k => data[k]).map((k, i) => {
    const isBtcSymbol = k === 'BTC' && activeView?.tab === 'bitcoin';
    const col = isBtcSymbol ? '#F7931A' : (data[k].color || (activeView?.tab === 'baskets' ? SECTOR_COLORS[k] : null) || PAL[i % PAL.length]);
    return {
      label:            k,
      data:             data[k].rebased,
      borderColor:      col,
      backgroundColor:  col + '12',
      borderWidth:      1.8,
      pointRadius:      0,
      pointHoverRadius: 4,
      tension:          0.1,
      fill:             false,
      spanGaps:         true,
    };
  });
  c.update();
}

function updatePerf(data, keys, isCorr = false, isMom = false, isZscore = false, isMcap = false) {
  document.getElementById('perf-row').innerHTML = keys.filter(k => data[k]).map((k, i) => {
    const r    = (data[k].rebased || []).filter(v => v != null);
    const last = r.length ? r[r.length - 1] : null;
    const col  = data[k].color || (activeView?.tab === 'baskets' ? SECTOR_COLORS[k] : null) || PAL[i % PAL.length];
    let valHtml;
    if (isCorr) {
      const cls = last === null ? 'neu' : last >= 0.5 ? 'pos' : last <= -0.2 ? 'neg' : 'neu';
      valHtml = `<span class="perf-val ${cls}">${last !== null ? last.toFixed(3) : '—'}</span>`;
    } else if (isMom) {
      const cls = last === null ? 'neu' : last >= 0 ? 'pos' : 'neg';
      valHtml = `<span class="perf-val ${cls}">${last !== null ? (last >= 0 ? '+' : '') + last.toFixed(1) + '%' : '—'}</span>`;
    } else if (isMcap) {
      const fmt = last === null ? '—' : last >= 1e9 ? `$${(last/1e9).toFixed(1)}B` : last >= 1e6 ? `$${(last/1e6).toFixed(0)}M` : `$${last.toFixed(0)}`;
      valHtml = `<span class="perf-val neu">${fmt}</span>`;
    } else {
      const ret = last !== null ? last - 100 : null;
      const cls = ret === null ? '' : ret >= 0 ? 'pos' : 'neg';
      const fmt = ret !== null ? (Math.abs(ret) >= 200 ? `${(ret/100+1).toFixed(1)}x` : `${ret >= 0 ? '+' : ''}${ret.toFixed(1)}%`) : '—';
      valHtml = `<span class="perf-val ${cls}">${fmt}</span>`;
    }
    return `<div class="perf-item">
      <div class="perf-dot" style="background:${col}"></div>
      <span class="perf-sym">${k}</span>${valHtml}
    </div>`;
  }).join('');
}

// ── Fetch ─────────────────────────────────────────────────────────────────────
async function fetchCurrent() {
  if (_navAbort) try { _navAbort.abort(); } catch(e) {}
  _navAbort = new AbortController();
  _navVersion++;
  // Hide equity placeholder if visible
  const ph = document.getElementById('equity-ph');
  if (ph) ph.style.display = 'none';

  // Views that don't need selection
  if (activeView?.key === 'sec-rrg') {
    await fetchRRG();
    document.getElementById('chart-spin').classList.remove('on');
    return;
  }

  if (activeView?.key === 'ana-bubble') {
    const from = document.getElementById('rp-from')?.value || '2024-01-01';
    const to   = document.getElementById('rp-to')?.value   || new Date().toISOString().split('T')[0];
    const win  = document.getElementById('rp-window')?.value || '30';
    await fetchBubble(from, to, win);
    return;
  }

  if (activeView?.key === 'btc-gold') {
    const from = document.getElementById('rp-from')?.value || '2020-01-01';
    const to   = document.getElementById('rp-to')?.value   || new Date().toISOString().split('T')[0];
    await fetchBtcGold(from, to);
    document.getElementById('chart-spin').classList.remove('on');
    return;
  }

  if (activeView?.key === 'alt-scatter') {
    const from = document.getElementById('rp-from')?.value || '2024-01-01';
    const to   = document.getElementById('rp-to')?.value   || new Date().toISOString().split('T')[0];
    const win  = document.getElementById('rp-window')?.value || '7';
    await fetchAltScatter(from, to, win);
    document.getElementById('chart-spin').classList.remove('on');
    return;
  }

  if (activeView?.key === 'btc-rolling') {
    const from = document.getElementById('rp-from')?.value || '2020-01-01';
    const to   = document.getElementById('rp-to')?.value   || new Date().toISOString().split('T')[0];

// ── Export combined dual-panel chart ──────────────────────────────────────────
function exportCombinedChart(topChart, botChart) {
  const showLogo   = document.getElementById('exp-logo')?.checked ?? true;
  const showTitle  = document.getElementById('exp-title')?.checked ?? true;
  const showSource = document.getElementById('exp-source')?.checked ?? true;

  const W = 2400, H = 1000;
  const PAD = 40;
  const CHART_PAD = 16;
  const HEADER_H = showTitle ? 56 : 16;
  const FOOTER_H = showSource ? 40 : 16;
  const GAP = 12;

  const EXP_BG    = '#FAFAFA';
  const EXP_FRAME = '#070B09';
  const EXP_TEXT  = '#070B09';

  // Save originals for both charts
  const saves = [topChart, botChart].map(c => ({
    dpr: c.options.devicePixelRatio,
    w: c.canvas.style.width, h: c.canvas.style.height,
    cw: c.canvas.width, ch: c.canvas.height,
    scales: Object.fromEntries(Object.entries(c.options.scales || {}).map(([id, s]) => [id, {
      tickColor: s.ticks?.color, tickFontSize: s.ticks?.font?.size,
      borderColor: s.border?.color, borderDisplay: s.border?.display,
      gridColor: s.grid?.color, gridDisplay: s.grid?.display,
    }])),
    legendColor: c.options.plugins?.legend?.labels?.color,
    legendSize: c.options.plugins?.legend?.labels?.font?.size,
    titleColor: c.options.plugins?.title?.color,
    titleSize: c.options.plugins?.title?.font?.size,
  }));

  // Panel dimensions: top gets 60%, bottom gets 40%
  const totalChartH = H - HEADER_H - FOOTER_H;
  const topH = Math.round(totalChartH * 0.6 - GAP / 2);
  const botH = Math.round(totalChartH * 0.4 - GAP / 2);
  const chartW = W - PAD * 2 - CHART_PAD * 2;

  // Apply export theme to both charts
  [topChart, botChart].forEach(c => {
    for (const [id, scale] of Object.entries(c.options.scales || {})) {
      if (scale.ticks) { scale.ticks.color = EXP_FRAME; if (!scale.ticks.font) scale.ticks.font = {}; scale.ticks.font.size = 18; }
      if (!scale.border) scale.border = {}; scale.border.color = EXP_FRAME; scale.border.display = true;
      if (scale.grid) { scale.grid.color = 'rgba(0,0,0,0)'; scale.grid.display = false; }
    }
    if (c.options.plugins?.legend?.labels) { c.options.plugins.legend.labels.color = EXP_TEXT; if (!c.options.plugins.legend.labels.font) c.options.plugins.legend.labels.font = {}; c.options.plugins.legend.labels.font.size = 14; }
    if (c.options.plugins?.title) { c.options.plugins.title.color = EXP_TEXT; if (!c.options.plugins.title.font) c.options.plugins.title.font = {}; c.options.plugins.title.font.size = 16; }
    c.options.devicePixelRatio = 1;
  });

  // Resize and render top chart
  topChart.canvas.width = chartW; topChart.canvas.height = topH - CHART_PAD * 2;
  topChart.canvas.style.width = chartW + 'px'; topChart.canvas.style.height = (topH - CHART_PAD * 2) + 'px';
  topChart.resize(chartW, topH - CHART_PAD * 2); topChart.update();

  // Resize and render bottom chart
  botChart.canvas.width = chartW; botChart.canvas.height = botH - CHART_PAD * 2;
  botChart.canvas.style.width = chartW + 'px'; botChart.canvas.style.height = (botH - CHART_PAD * 2) + 'px';
  botChart.resize(chartW, botH - CHART_PAD * 2); botChart.update();

  // Build export canvas
  const off = document.createElement('canvas');
  off.width = W; off.height = H;
  const ctx = off.getContext('2d');

  // Background
  ctx.fillStyle = EXP_BG;
  ctx.fillRect(0, 0, W, H);

  // Top panel frame
  const topY = HEADER_H;
  ctx.strokeStyle = EXP_FRAME; ctx.lineWidth = 1.5;
  ctx.strokeRect(PAD, topY, W - PAD * 2, topH);
  ctx.drawImage(topChart.canvas, PAD + CHART_PAD, topY + CHART_PAD);

  // Bottom panel frame
  const botY = HEADER_H + topH + GAP;
  ctx.strokeRect(PAD, botY, W - PAD * 2, botH);
  ctx.drawImage(botChart.canvas, PAD + CHART_PAD, botY + CHART_PAD);

  // Logo
  if (showLogo && _exportLogo.naturalWidth) {
    const logoH = 36;
    const logoW = (logoH / _exportLogo.naturalHeight) * _exportLogo.naturalWidth;
    try { ctx.drawImage(_exportLogo, PAD, 10, logoW, logoH); } catch(e) {}
  }

  // Title
  if (showTitle) {
    const title = document.getElementById('chart-title')?.textContent || '';
    ctx.fillStyle = EXP_TEXT;
    ctx.font = '400 22px DM Sans, Helvetica Neue, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(title, W / 2, 36);
    ctx.textAlign = 'left';
  }

  // Source
  if (showSource) {
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const now = new Date();
    const dateFormatted = now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
    ctx.fillStyle = 'rgba(7,11,9,0.6)';
    ctx.font = '400 14px DM Sans, Helvetica Neue, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('Source: Wintermute    Data as of: ' + dateFormatted, W - PAD, H - 12);
    ctx.textAlign = 'left';
  }

  // Download
  const a = document.createElement('a');
  const vk = activeView?.key || 'chart';
  const dt = new Date().toISOString().split('T')[0];
  a.download = vk + '_' + dt + '.png';
  a.href = off.toDataURL('image/png');
  a.click();

  // Restore both charts
  [topChart, botChart].forEach((c, i) => {
    const s = saves[i];
    c.options.devicePixelRatio = s.dpr || undefined;
    for (const [id, scale] of Object.entries(c.options.scales || {})) {
      const orig = s.scales[id] || {};
      if (scale.ticks) { scale.ticks.color = orig.tickColor; if (scale.ticks.font) scale.ticks.font.size = orig.tickFontSize; }
      if (scale.border) { scale.border.color = orig.borderColor; scale.border.display = orig.borderDisplay; }
      if (scale.grid) { scale.grid.color = orig.gridColor; scale.grid.display = orig.gridDisplay; }
    }
    if (c.options.plugins?.legend?.labels) { c.options.plugins.legend.labels.color = s.legendColor; if (c.options.plugins.legend.labels.font) c.options.plugins.legend.labels.font.size = s.legendSize; }
    if (c.options.plugins?.title) { c.options.plugins.title.color = s.titleColor; if (c.options.plugins.title.font) c.options.plugins.title.font.size = s.titleSize; }
    c.canvas.width = s.cw; c.canvas.height = s.ch;
    c.canvas.style.width = s.w; c.canvas.style.height = s.h;
    c.resize(); c.update();
  });
}

  if (showLogo && _exportLogo.naturalWidth) {
    const logoH = 36;
    const logoW = (logoH / _exportLogo.naturalHeight) * _exportLogo.naturalWidth;
    try { ctx.drawImage(_exportLogo, PAD, 10, logoW, logoH); } catch(e) {}
  }

  // Title — matplotlib style: fontsize=10, fontweight="normal", pad=10
  // Scaled to 2400px canvas: ~20px, normal weight
  if (showTitle) {
    const title = document.getElementById('chart-title')?.textContent || '';
    ctx.fillStyle = EXP_TEXT;
    ctx.font = '400 22px DM Sans, Helvetica Neue, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(title, W / 2, 36);
    ctx.textAlign = 'left';
  }

  // Source — matplotlib style: fontsize=7, ha="right", va="bottom", alpha=0.6
  // Scaled: ~14px
  if (showSource) {
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const now = new Date();
    const dateFormatted = now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
    ctx.fillStyle = 'rgba(7,11,9,0.6)';
    ctx.font = '400 14px DM Sans, Helvetica Neue, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('Source: Wintermute    Data as of: ' + dateFormatted, W - PAD, H - 12);
    ctx.textAlign = 'left';
  }

  // Download
  const a = document.createElement('a');
  const vk = activeView?.key || 'chart';
  const sel = selected?.join('_') || '';
  const dt = new Date().toISOString().split('T')[0];
  a.download = vk + '_' + sel + '_' + dt + '.png';
  a.href = off.toDataURL('image/png');
  a.click();

  // Restore
  chart.options.devicePixelRatio = origDPR || undefined;
  for (const [id, scale] of Object.entries(chart.options.scales || {})) {
    const orig = origScales[id] || {};
    if (scale.ticks) {
      scale.ticks.color = orig.tickColor;
      if (scale.ticks.font) scale.ticks.font.size = orig.tickFontSize;
    }
    if (scale.border) {
      scale.border.color = orig.borderColor;
      scale.border.display = orig.borderDisplay;
    }
    if (scale.grid) {
      scale.grid.color = orig.gridColor;
      scale.grid.display = orig.gridDisplay;
      scale.grid.drawBorder = orig.gridDrawBorder;
    }
    if (scale.title) scale.title.color = orig.titleColor;
  }
  if (chart.options.plugins?.legend?.labels) {
    chart.options.plugins.legend.labels.color = origLegendColor;
    if (chart.options.plugins.legend.labels.font) chart.options.plugins.legend.labels.font.size = origLegendSize;
  }
  chart.canvas.width = origCW;
  chart.canvas.height = origCH;
  chart.canvas.style.width = origW;
  chart.canvas.style.height = origH;
  chart.resize();
  chart.update();
});

function heatCorr(v) {
  if (v === null || v === undefined) return 'rgba(60,60,60,0.6)';
  const t = (v + 1) / 2;
  if (t < 0.5) {
    const f = t * 2;
    return `rgb(${Math.round(220)},${Math.round(60 + 195*f)},${Math.round(60 + 195*f)})`;
  } else {
    const f = (t - 0.5) * 2;
    return `rgb(${Math.round(255 - 195*f)},${Math.round(220)},${Math.round(255 - 195*f)})`;
  }
}
function heatFunding(v, maxAbs) {
  if (v === null || v === undefined) return 'rgba(60,60,60,0.6)';
  const t = Math.max(-1, Math.min(1, v / (maxAbs || 0.001)));
  return t > 0
    ? `rgba(236,91,91,${0.15 + 0.85 * t})`
    : `rgba(0,214,74,${0.15 + 0.85 * Math.abs(t)})`;
}
function drawHeatmapCanvas(rowLabels, colLabels, matrix, colorFn) {
  if (chart) { chart.destroy(); chart = null; }
  const box = document.getElementById('chart-box');
  const canvas = document.getElementById('main-chart');
  const W = box.clientWidth  || 600;
  const H = box.clientHeight || 400;
  canvas.width  = W;
  canvas.height = H;
  const cx = canvas.getContext('2d');
  cx.clearRect(0, 0, W, H);
  const nR = rowLabels.length, nC = colLabels.length;
  if (!nR || !nC) return;
  const padL = 120, padT = 60, padB = 10, padR = 10;
  const cellW = (W - padL - padR) / nC;
  const cellH = (H - padT - padB) / nR;
  cx.font = '11px monospace';
  for (let i = 0; i < nR; i++) {
    for (let j = 0; j < nC; j++) {
      const v = Array.isArray(matrix[i]) ? matrix[i][j] : null;
      const x = padL + j * cellW, y = padT + i * cellH;
      cx.fillStyle = colorFn(v, 0.05);
      cx.fillRect(x, y, cellW - 1, cellH - 1);
      if (v !== null && v !== undefined) {
        cx.fillStyle = Math.abs(v) > 0.5 ? '#111' : '#eee';
        cx.textAlign = 'center';
        cx.textBaseline = 'middle';
        cx.fillText(v.toFixed(2), x + cellW / 2, y + cellH / 2);
      }
    }
    cx.fillStyle = '#aaa';
    cx.textAlign = 'right';
    cx.textBaseline = 'middle';
    cx.fillText(rowLabels[i], padL - 4, padT + i * cellH + cellH / 2);
  }
  for (let j = 0; j < nC; j++) {
    cx.save();
    cx.fillStyle = '#aaa';
    cx.font = '11px monospace';
    cx.textAlign = 'right';
    cx.textBaseline = 'middle';
    cx.translate(padL + j * cellW + cellW / 2, padT - 8);
    cx.rotate(-Math.PI / 4);
    cx.fillText(colLabels[j], 0, 0);
    cx.restore();
  }
}

function mkChart(type, data, options, plugins) {
  // Clean up control center matrix if present
  const ccEl = document.getElementById('cc-matrix-container');
  const combEl = document.getElementById('combined-chart-container');
  if (combEl) { if (chart?._combinedBot) chart._combinedBot.destroy(); combEl.remove(); }
  if (ccEl) ccEl.remove();
  const mainCanvas = document.getElementById('main-chart');
  if (mainCanvas) mainCanvas.style.display = '';
  if (chart) { chart.destroy(); chart = null; }
  const ctx2 = document.getElementById('main-chart').getContext('2d');
  chart = new Chart(ctx2, { type, data, options: Object.assign({}, CDEFAULT, options), plugins: plugins || [] });
  return chart;
}
function setTitle(t, s) {
  document.getElementById('chart-title').textContent = t;
  if (s) document.getElementById('chart-src').textContent = s;
}
function fmtBig(v) {
  if (v == null) return '—';
  if (Math.abs(v) >= 1e9) return (v/1e9).toFixed(1)+'B';
  if (Math.abs(v) >= 1e6) return (v/1e6).toFixed(0)+'M';
  if (Math.abs(v) >= 1e3) return (v/1e3).toFixed(0)+'K';
  return v.toFixed(0);
}
