<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wintermute — Market Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg:       #FAFAFA;
  --logo-color: #000000;
  --surface:  #FFFFFF;
  --border:   #E4E4E2;
  --spine:    #606663;
  --graphite: #323935;
  --muted:    #888B88;
  --input-bg: #F0F0EE;
  --tag-bg:   #EAEAE8;
  --font:     'DM Sans', 'Helvetica Neue', sans-serif;
  --mono:     'DM Mono', 'Courier New', monospace;
  --radius:   6px;
  --side-w:   268px;
}

[data-theme="dark"] {
  --bg:       #0F1110;
  --logo-color: #FAFAFA;
  --surface:  #1A1D1B;
  --border:   #2A2D2B;
  --spine:    #606663;
  --graphite: #E8EAE8;
  --muted:    #666968;
  --input-bg: #1E221F;
  --tag-bg:   #1E221F;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--graphite);
  font-family: var(--font);
  font-size: 16px;
  height: 100vh;
  overflow: hidden;
  display: grid;
  grid-template-rows: 52px 40px 1fr;
  grid-template-columns: var(--side-w) 1fr var(--side-w);
}

/* ── Top header row ── */
.header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
  background: var(--bg);
}

.logo-mark {
  width: 26px; height: 26px;
  background: var(--graphite);
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.logo-mark svg { width: 14px; height: 14px; }

.logo-name {
  font-size: 14px; font-weight: 600;
  color: var(--graphite); letter-spacing: -0.02em;
  flex-shrink: 0;
}

.header-divider { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }
.header-spacer  { flex: 1; }

.header-pill {
  font-family: var(--mono); font-size: 11px;
  color: var(--muted); background: var(--tag-bg);
  padding: 4px 10px; border-radius: 20px;
}

/* Dark mode toggle */
.dark-toggle {
  width: 32px; height: 32px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.dark-toggle:hover { border-color: var(--spine); color: var(--graphite); }
.dark-toggle svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; }

/* ── Tab bar row ── */
.tabbar {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  gap: 2px;
}

.tab {
  padding: 0 14px;
  height: 40px;
  display: flex; align-items: center;
  font-size: 13px; font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  white-space: nowrap;
  background: none; border-top: none; border-left: none; border-right: none;
  font-family: var(--font);
}

.tab:hover { color: var(--graphite); }
.tab.active { color: var(--graphite); border-bottom-color: var(--graphite); }

.tab-spacer { flex: 1; }

/* Granularity + align toggles in tabbar */
.toggle-group {
  display: flex; gap: 3px;
  align-items: center;
}

.tgl-btn {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  padding: 4px 10px; border-radius: 20px;
  border: 1px solid var(--border); background: none;
  color: var(--muted); cursor: pointer; transition: all 0.12s;
}
.tgl-btn:hover { border-color: var(--spine); color: var(--graphite); }
.tgl-btn.active { background: var(--graphite); border-color: var(--graphite); color: #fff; }
[data-theme="dark"] .tgl-btn.active { background: #E8EAE8; color: #0F1110; }

.tgl-sep { width: 1px; height: 16px; background: var(--border); margin: 0 4px; }

/* ── Content row ── */
/* Left panel */
.left-panel {
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  background: var(--bg);
}

.panel-hdr {
  padding: 12px 16px 8px;
  border-bottom: 1px solid var(--border);
  font-size: 11px; font-weight: 600;
  color: var(--muted); letter-spacing: 0.07em;
  text-transform: uppercase; flex-shrink: 0;
}

.view-tree { flex: 1; overflow-y: auto; padding: 4px 0; }
.view-tree::-webkit-scrollbar { width: 3px; }
.view-tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.tree-group { margin-bottom: 2px; }

.tree-grp-hdr {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 16px; font-size: 13px; font-weight: 500;
  color: var(--muted); cursor: pointer; user-select: none;
  transition: color 0.1s;
}
.tree-grp-hdr:hover { color: var(--graphite); }

.chevron {
  width: 13px; height: 13px;
  stroke: currentColor; fill: none; stroke-width: 2;
  stroke-linecap: round; stroke-linejoin: round;
  transition: transform 0.15s; flex-shrink: 0;
}
.tree-group.open .chevron { transform: rotate(90deg); }
.tree-children { display: none; }
.tree-group.open .tree-children { display: block; }

.tree-leaf {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 16px 7px 34px;
  font-size: 14px; color: var(--muted); cursor: pointer;
  border-left: 2px solid transparent; transition: all 0.1s;
}
.tree-leaf:hover { color: var(--graphite); background: var(--tag-bg); }
.tree-leaf.active { color: var(--graphite); border-left-color: var(--graphite); background: var(--tag-bg); font-weight: 500; }

.tree-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
.tree-leaf.active .tree-dot { background: #00D64A; }

/* Main chart */
.main {
  display: flex; flex-direction: column; overflow: hidden; min-width: 0;
  background: var(--bg);
}

.chart-hdr {
  padding: 16px 22px 0;
  display: flex; align-items: flex-start; justify-content: space-between; flex-shrink: 0;
}
.chart-title { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }
.chart-sub   { font-size: 13px; color: var(--muted); margin-top: 3px; }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font); font-size: 13px; font-weight: 500;
  padding: 7px 14px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--surface);
  color: var(--graphite); cursor: pointer; transition: all 0.1s; white-space: nowrap;
}
.btn:hover { border-color: var(--spine); }
.btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

.perf-row { padding: 10px 22px 2px; display: flex; gap: 12px; flex-wrap: wrap; min-height: 30px; flex-shrink: 0; }
.perf-item { display: flex; align-items: center; gap: 5px; }
.perf-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.perf-sym  { font-family: var(--mono); font-size: 13px; font-weight: 500; }
.perf-val  { font-family: var(--mono); font-size: 12px; padding: 2px 7px; border-radius: 10px; }
.pos { background: #E6F9EE; color: #0A6E2A; }
.neg { background: #FDEAEA; color: #9B2020; }
.neu { background: var(--tag-bg); color: var(--muted); }
[data-theme="dark"] .pos { background: #0A2E15; color: #4AE07A; }
[data-theme="dark"] .neg { background: #2E0A0A; color: #E07A7A; }

.chart-area { flex: 1; padding: 4px 22px 0; position: relative; min-height: 0; }
canvas { display: block; width: 100% !important; height: 100% !important; }

.empty {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: var(--muted); gap: 10px;
}
.empty svg { width: 30px; height: 30px; stroke: var(--border); fill: none; stroke-width: 1; }
.empty p { font-size: 14px; }

.spinner-wrap {
  position: absolute; inset: 0; display: none;
  align-items: center; justify-content: center;
  background: color-mix(in srgb, var(--bg) 85%, transparent);
}
.spinner-wrap.on { display: flex; }
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border); border-top-color: var(--spine);
  border-radius: 50%; animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.chart-src {
  padding: 5px 22px 12px;
  font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.06em; flex-shrink: 0;
}
.chart-info {
  padding: 4px 22px 14px;
  font-family: var(--mono); font-size: 11px; color: var(--muted); line-height: 1.7; flex-shrink: 0;
  border-top: 1px solid var(--border); margin-top: 2px; display: none;
}

/* Right panel */
.right-panel {
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  background: var(--bg);
}

.rp-block { padding: 12px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.rp-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 7px; }

.search-wrap { position: relative; }
.search-wrap svg {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px; stroke: var(--muted); fill: none; stroke-width: 1.5; pointer-events: none;
}

input[type=text] {
  width: 100%; background: var(--input-bg); border: 1px solid transparent;
  border-radius: var(--radius); padding: 8px 10px 8px 32px;
  font-family: var(--font); font-size: 14px; color: var(--graphite);
  outline: none; transition: border-color 0.15s;
}
input[type=text]:focus { border-color: var(--spine); }
input[type=text]::placeholder { color: var(--muted); }

input[type=date], input[type=number] {
  width: 100%; background: var(--input-bg); border: 1px solid transparent;
  border-radius: var(--radius); padding: 7px 9px;
  font-family: var(--mono); font-size: 13px; color: var(--graphite);
  outline: none; transition: border-color 0.15s;
}
input[type=date]:focus, input[type=number]:focus { border-color: var(--spine); }

.date-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
.date-grid label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 3px; }

.presets { display: flex; gap: 3px; flex-wrap: wrap; }
.preset {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  padding: 4px 9px; border-radius: 20px; border: 1px solid var(--border);
  background: none; color: var(--muted); cursor: pointer; transition: all 0.12s;
}
.preset:hover { border-color: var(--spine); color: var(--graphite); }
.preset.active { background: var(--graphite); border-color: var(--graphite); color: var(--bg); }

.window-row { display: flex; align-items: center; gap: 8px; }
.window-row label { font-size: 13px; color: var(--muted); white-space: nowrap; }
input[type=number] { width: 70px; }

.versus-row { display: flex; gap: 6px; }
.versus-btn {
  flex: 1; padding: 6px 0; border-radius: var(--radius);
  border: 1px solid var(--border); background: none;
  font-family: var(--mono); font-size: 12px; font-weight: 500;
  color: var(--muted); cursor: pointer; transition: all 0.12s; text-align: center;
}
.versus-btn:hover { border-color: var(--spine); color: var(--graphite); }
.versus-btn.active { background: var(--graphite); border-color: var(--graphite); color: var(--bg); }

.tags { display: flex; flex-wrap: wrap; gap: 4px; min-height: 26px; }
.tag {
  display: inline-flex; align-items: center; gap: 3px;
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  padding: 3px 8px 3px 9px; border-radius: 20px; color: #fff;
}
.tag-x { cursor: pointer; opacity: 0.7; font-size: 14px; line-height: 1; }
.tag-x:hover { opacity: 1; }

.rp-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
.rp-list::-webkit-scrollbar { width: 3px; }
.rp-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.list-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; border-radius: var(--radius); cursor: pointer; transition: background 0.1s;
}
.list-item:hover { background: var(--tag-bg); }
.list-item.active { background: var(--graphite); }
.list-item.active .item-sym,
.list-item.active .item-name,
.list-item.active .item-count { color: var(--bg) !important; }
.list-item.active .item-dot { background: #00D64A !important; }

.item-dot  { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
.item-sym  { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--graphite); min-width: 60px; }
.item-name { font-size: 13px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.item-count { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-left: auto; flex-shrink: 0; }

/* Equity placeholder */
.coming-soon {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--muted); gap: 12px; padding: 40px;
}
.coming-soon svg { width: 40px; height: 40px; stroke: var(--border); fill: none; stroke-width: 1; }
.coming-soon h3 { font-size: 16px; font-weight: 500; color: var(--graphite); }
.coming-soon p { font-size: 14px; text-align: center; line-height: 1.6; max-width: 280px; }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <svg class="wm-logo" viewBox="0 0 220 40" fill="none" xmlns="http://www.w3.org/2000/svg" style="height:28px;width:auto;flex-shrink:0">
    <!-- Crystal mark -->
    <g stroke="var(--logo-color)" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round" fill="none">
      <!-- outer diamond -->
      <polygon points="20,2 36,14 20,38 4,14"/>
      <!-- inner facets -->
      <line x1="4"  y1="14" x2="20" y2="20"/>
      <line x1="36" y1="14" x2="20" y2="20"/>
      <line x1="20" y1="2"  x2="20" y2="20"/>
      <line x1="20" y1="20" x2="20" y2="38"/>
      <!-- mid horizontal -->
      <line x1="4"  y1="14" x2="36" y2="14"/>
      <!-- left inner triangle -->
      <line x1="4"  y1="14" x2="12" y2="26"/>
      <line x1="20" y1="20" x2="12" y2="26"/>
      <!-- right inner triangle -->
      <line x1="36" y1="14" x2="28" y2="26"/>
      <line x1="20" y1="20" x2="28" y2="26"/>

    <!-- WINTERMUTE wordmark -->
    <text x="48" y="28" font-family="DM Sans, Helvetica Neue, sans-serif" font-size="18" font-weight="600" letter-spacing="3" fill="var(--logo-color)">WINTERMUTE</text>
  </svg>
  <div class="header-divider"></div>
  <span style="font-size:13px;color:var(--muted)" id="bc-view">—</span>
  <div class="header-spacer"></div>
  <span class="header-pill" id="db-count">—</span>
  <button class="dark-toggle" id="dark-toggle" title="Toggle dark mode">
    <svg viewBox="0 0 24 24" id="dark-icon">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>
</header>

<!-- Tab bar -->
<div class="tabbar">
  <button class="tab active" data-tab="control_center">Control Center</button>
  <button class="tab" data-tab="bitcoin">Bitcoin</button>
  <button class="tab" data-tab="ethereum">Ethereum</button>
  <button class="tab" data-tab="altcoins">Altcoins</button>
  <button class="tab" data-tab="baskets">Baskets</button>
  <button class="tab" data-tab="crypto_market">Crypto Market</button>
  <button class="tab" data-tab="macro">Macro</button>
  <button class="tab" data-tab="equity">Equity</button>
  <button class="tab" data-tab="data">
    <svg style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;margin-right:4px;vertical-align:-2px" viewBox="0 0 16 16"><ellipse cx="8" cy="4" rx="6" ry="2"/><path d="M2 4v4c0 1.1 2.69 2 6 2s6-.9 6-2V4"/><path d="M2 8v4c0 1.1 2.69 2 6 2s6-.9 6-2V8"/></svg>
    Data
  </button>
  <div class="tab-spacer"></div>
  <div class="toggle-group">
    <button class="tgl-btn active" data-gran="daily" id="gran-daily">Daily</button>
    <button class="tgl-btn" data-gran="hourly" id="gran-hourly">Hourly</button>
  </div>
  <div class="tgl-sep"></div>
  <button class="tgl-btn" id="btn-log" title="Toggle log scale">Log</button>
  <div class="tgl-sep"></div>
  <div class="toggle-group">
    <button class="tgl-btn active" data-align="own" id="align-own">Own start</button>
    <button class="tgl-btn" data-align="common" id="align-common">Common start</button>
  </div>
</div>

<!-- Content -->
<aside class="left-panel">
  <div class="panel-hdr">Views</div>
  <div class="view-tree" id="view-tree"></div>
</aside>

<main class="main">
  <div class="chart-hdr">
    <div>
      <div class="chart-title" id="chart-title">—</div>
      <div class="chart-sub" id="chart-sub">—</div>
    </div>
    <button class="btn" id="btn-save">
      <svg viewBox="0 0 16 16"><path d="M3 13h10M8 3v7M5 7l3 3 3-3"/></svg>
      Save PNG
    </button>
    <div style="display:flex;gap:12px;align-items:center;margin-left:8px;font-size:11px;color:var(--muted)">
      <label style="display:flex;align-items:center;gap:3px;cursor:pointer"><input type="checkbox" id="exp-logo" checked style="width:13px;height:13px">Logo</label>
      <label style="display:flex;align-items:center;gap:3px;cursor:pointer"><input type="checkbox" id="exp-title" checked style="width:13px;height:13px">Title</label>
      <label style="display:flex;align-items:center;gap:3px;cursor:pointer"><input type="checkbox" id="exp-source" checked style="width:13px;height:13px">Source</label>
    </div>
  </div>
  <div class="perf-row" id="perf-row"></div>
  <div class="chart-area">
    <canvas id="main-chart"></canvas>
    <div class="empty" id="chart-empty">
      <svg viewBox="0 0 32 32"><polyline points="2,26 10,16 16,20 22,10 30,14"/><rect x="2" y="2" width="28" height="28" rx="2"/></svg>
      <p id="empty-msg">Select items from the right panel</p>
    </div>
    <div class="spinner-wrap" id="chart-spin"><div class="spinner"></div></div>
  </div>
  <div class="chart-src" id="chart-src">Source: CoinGecko Pro — Wintermute OTC</div>
  <div class="chart-info" id="chart-info"></div>
</main>

<aside class="right-panel" id="right-panel"></aside>

// ── Dark mode ─────────────────────────────────────────────────────────────────
document.getElementById('dark-toggle').addEventListener('click', () => {
  darkMode = !darkMode;
  document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
  if (chart) {
    updateChartTheme();
    chart.update();
  }
});

function themeColor() {
  return darkMode ? '#E8EAE8' : '#323935';
}

function updateChartTheme() {
  if (!chart) return;
  const tc = darkMode ? '#E8EAE8' : '#606663';
  chart.options.scales.x.ticks.color   = tc;
  chart.options.scales.x.border.color  = tc;
  chart.options.scales.y.ticks.color   = tc;
  chart.options.scales.y.border.color  = tc;
  chart.options.plugins.tooltip.backgroundColor = darkMode ? '#1A1D1B' : '#fff';
  chart.options.plugins.tooltip.titleColor       = darkMode ? '#E8EAE8' : '#323935';
  chart.options.plugins.tooltip.bodyColor        = darkMode ? '#888B88' : '#606663';
  chart.options.plugins.tooltip.borderColor      = darkMode ? '#2A2D2B' : '#E4E4E2';
}

// ── Log scale ────────────────────────────────────────────────────────────────
document.getElementById('btn-log')?.addEventListener('click', () => {
  logScale = !logScale;
  document.getElementById('btn-log').style.background = logScale ? 'var(--graphite)' : '';
  document.getElementById('btn-log').style.color      = logScale ? 'var(--bg)'       : '';
  document.getElementById('btn-log').style.borderColor= logScale ? 'var(--graphite)' : '';
  if (chart && chart.options.scales.y) {
    chart.options.scales.y.type = logScale ? 'logarithmic' : 'linear';
    chart.update();
  }
});

// ── Granularity ───────────────────────────────────────────────────────────────
document.querySelectorAll('[data-gran]').forEach(btn => {
  btn.addEventListener('click', () => {
    granularity = btn.dataset.gran;
    document.querySelectorAll('[data-gran]').forEach(b => b.classList.toggle('active', b.dataset.gran === granularity));
    // When switching granularity, reset date range to sensible default
    const fromEl = document.getElementById('rp-from');
    const toEl   = document.getElementById('rp-to');
    if (fromEl && toEl) {
      if (granularity === 'hourly') {
        // Cap to 90 days max
        const to   = new Date();
        const from = new Date();
        from.setDate(from.getDate() - 30); // default to 1M for hourly
        fromEl.min   = new Date(Date.now() - 90*24*60*60*1000).toISOString().split('T')[0];
        fromEl.value = from.toISOString().split('T')[0];
        toEl.value   = to.toISOString().split('T')[0];
        // Update preset active state
        document.querySelectorAll('#rp-presets .preset').forEach(b => b.classList.toggle('active', b.dataset.days === '30'));
      } else {
        // Reset to 6M for daily
        const to   = new Date();
        const from = new Date();
        from.setDate(from.getDate() - 180);
        fromEl.min   = '';
        fromEl.value = from.toISOString().split('T')[0];
        toEl.value   = to.toISOString().split('T')[0];
        document.querySelectorAll('#rp-presets .preset').forEach(b => b.classList.toggle('active', b.dataset.days === '180'));
      }
    }
    fetchCurrent();
  });
});

// ── Align mode ────────────────────────────────────────────────────────────────
document.querySelectorAll('[data-align]').forEach(btn => {
  btn.addEventListener('click', () => {
    alignMode = btn.dataset.align;
    document.querySelectorAll('[data-align]').forEach(b => b.classList.toggle('active', b.dataset.align === alignMode));
    fetchCurrent();
  });
});

// ── Tab switching ─────────────────────────────────────────────────────────────
document.querySelectorAll('.tab[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    activeTab = btn.dataset.tab;
    document.querySelectorAll('.tab[data-tab]').forEach(b => b.classList.toggle('active', b.dataset.tab === activeTab));
    selected = [];
    if (activeTab === 'equity') {
      hideDataView();
      showEquityPlaceholder();
    } else if (activeTab === 'data') {
      showDataView();
    } else {
      hideDataView();
      const ep = document.getElementById('equity-ph');
      if (ep) ep.style.display = 'none';
      const firstGroup = TABS[activeTab]?.groups?.[0];
      const firstView  = firstGroup?.children?.[0];
      if (firstView) selectView(activeTab, firstView.key);
    }
  });
});

// ── Build tree ────────────────────────────────────────────────────────────────
function buildTree(tab) {
  const def = TABS[tab];
  if (!def || !def.groups.length) {
    document.getElementById('view-tree').innerHTML = '';
    return;
  }
  document.getElementById('view-tree').innerHTML = def.groups.map((g, gi) => `
    <div class="tree-group open" data-gi="${gi}">
      <div class="tree-grp-hdr" onclick="this.parentElement.classList.toggle('open')">
        <svg class="chevron" viewBox="0 0 16 16"><polyline points="4,6 8,10 12,6"/></svg>
        ${g.label}
      </div>
      <div class="tree-children">
        ${g.children.map(c => `
          <div class="tree-leaf ${activeView?.key === c.key ? 'active' : ''}" data-key="${c.key}"
               onclick="selectView('${tab}','${c.key}')">
            <div class="tree-dot"></div>${c.label}
          </div>`).join('')}
      </div>
    </div>`).join('');
}

  'sec-equal': ['General Purpose Blockchain Networks', 'Layer 2'],
  'sec-mcap':  ['General Purpose Blockchain Networks', 'Layer 2'],
};

const ALL_PERIOD_KEYS = new Set(['btc-ma','btc-ma-gap','btc-200w-floor','btc-200d-dev','btc-pi-cycle','eth-ma','eth-ma-combined','eth-ma-gap','eth-200d-dev']);
const CUSTOM_START_DATE = {'btc-200d-dev': '2017-03-01', 'eth-200d-dev': '2017-09-01'};

async function selectView(tab, key) {
  // Always clean up control center matrix when switching views
  const _ccEl = document.getElementById('cc-matrix-container');
  if (_ccEl) _ccEl.remove();
  const _mc = document.getElementById('main-chart');
  if (_mc) _mc.style.display = '';

  // Switch tab if navigating across tabs (e.g. from control center links)
  if (tab !== activeTab && TABS[tab]) {
    activeTab = tab;
    document.querySelectorAll('.tab[data-tab]').forEach(b => b.classList.toggle('active', b.dataset.tab === activeTab));
    // Hide equity/data special views
    const ep = document.getElementById('equity-ph');
    if (ep) ep.style.display = 'none';
    hideDataView && hideDataView();
  }

  let viewDef = null;
  for (const g of (TABS[tab]?.groups || []))
    for (const c of g.children)
      if (c.key === key) viewDef = c;
  if (!viewDef) return;

  activeView = { tab, key, def: viewDef };
  // Disable hourly for sector tab (too expensive + not meaningful)
  const hourlyBtn = document.getElementById('gran-hourly');
  if (tab === 'baskets') {
    hourlyBtn.disabled = true;
    hourlyBtn.title = 'Hourly not available for sector views';
    hourlyBtn.style.opacity = '0.35';
    hourlyBtn.style.cursor = 'not-allowed';
    if (granularity === 'hourly') {
      granularity = 'daily';
      document.getElementById('gran-daily').classList.add('active');
      hourlyBtn.classList.remove('active');
    }
  } else {
    hourlyBtn.disabled = false;
    hourlyBtn.title = '';
    hourlyBtn.style.opacity = '';
    hourlyBtn.style.cursor = '';
  }
  selected   = [];
  buildTree(tab);

  document.getElementById('bc-view').textContent = `${TABS[tab].label} / ${viewDef.label}`;
  document.getElementById('chart-title').textContent = viewDef.label;
  document.getElementById('chart-sub').textContent   = viewDef.sub;
  document.getElementById('chart-src').textContent   = `Source: ${viewDef.src}`;
  const infoEl = document.getElementById('chart-info');
  infoEl.style.display = 'none'; infoEl.innerHTML = '';

  if (chart) { chart.destroy(); chart = null; }
  logScale = false;
  const logBtn = document.getElementById('btn-log');
  if (logBtn) {
    logBtn.style.display = '';
    logBtn.style.background = ''; logBtn.style.color = ''; logBtn.style.borderColor = '';
  }
  document.getElementById('chart-empty').style.display = 'flex';
  const isBtcAutoView = key === 'btc-epochs' || key === 'btc-cycles' || key === 'ana-bubble' || key === 'btc-tradfi' || key === 'btc-rolling' || key === 'sec-rrg';
  document.getElementById('empty-msg').textContent = isBtcAutoView ? 'Loading…' : 'Select items from the right panel';
  document.getElementById('perf-row').innerHTML = '';

  // Load items for this tab
  if (tab === 'baskets') {
    allItems = allSectors;
  } else {
    const res = await fetch(`/api/assets?tab=${tab === 'bitcoin' ? 'majors' : tab === 'crypto_market' ? 'majors' : tab === 'control_center' ? 'majors' : tab === 'ethereum' ? 'majors' : tab}`);
    allItems  = await res.json();
  }

  buildRightPanel(tab, key);
  // Views that auto-fetch without selection
  const AUTO_VIEWS = new Set([
    'btc-overview','eth-overview','alt-overview','bas-overview','cc-matrix','sec-overview','sec-overview','cc-bitcoin','cc-themes','cc-altcoins','cc-macro','ana-bubble','btc-epochs','btc-cycles','btc-tradfi','alt-scatter','btc-gold','btc-rolling','sec-rrg',
    'btc-overview','eth-overview','alt-overview','bas-overview','cc-matrix','sec-overview','sec-overview','cc-bitcoin','cc-themes','cc-altcoins','cc-macro','sec-dominance','sec-xheatmap','sec-cumulative','sec-sharpe',
    'btc-bull','btc-realvol','btc-drawdown','btc-gold-ratio','btc-dominance','btc-funding','btc-oi','btc-funding-delta',
    'btc-ma','eth-ma','eth-ma-combined','eth-ma-gap','eth-200d-dev','eth-drawdown','eth-mcap','eth-btc-ratio','am-mcap','am-mcap-gap','am-mcap-dev','am-dominance','am-rel-share','am-btc-ratio','am-intracorr','btc-ma-gap','btc-200w-floor','btc-200d-dev','btc-pi-cycle','btc-mcap','btc-rv-iv','cm-total-mcap','alt-altseason','alt-beta','alt-ath-drawdown','alt-drawdown-ts',
    'mac-matrix','mac-dxy-btc','mac-risk','mac-real-yields','mac-stablecoin',
  ]);
  if (AUTO_VIEWS.has(key)) {
    document.getElementById('chart-empty').style.display = 'none';
    document.getElementById('empty-msg').textContent = 'Loading…';
    if (ALL_PERIOD_KEYS.has(key)) {
      const fromEl = document.getElementById('rp-from');
      if (fromEl) fromEl.value = CUSTOM_START_DATE[key] || '2013-01-01';
    }
    // Apply default selections if defined and nothing currently selected
    if (DEFAULT_SELECTIONS[key]) {
      selected = [...DEFAULT_SELECTIONS[key]];
      // Check the corresponding checkboxes
      document.querySelectorAll('.sel-cb').forEach(cb => {
        cb.checked = selected.includes(cb.value);
      });
    }
    // Apply default selections if defined and nothing currently selected
    if (DEFAULT_SELECTIONS[key]) {
      selected = [...DEFAULT_SELECTIONS[key]];
      // Check the corresponding checkboxes
      document.querySelectorAll('.sel-cb').forEach(cb => {
        cb.checked = selected.includes(cb.value);
      });
    }
    setTimeout(fetchCurrent, 100);
  }
}

// ── Render list ───────────────────────────────────────────────────────────────
function renderRPList(q = '') {
  const el = document.getElementById('rp-list');
  if (!el) return;

  const items = q
    ? allItems.filter(a => (a.symbol||a.name||'').toLowerCase().includes(q) || (a.name||'').toLowerCase().includes(q))
    : allItems;

  if (activeView?.tab === 'baskets') {
    el.innerHTML = items.map(s => `
      <div class="list-item ${selected.includes(s.name) ? 'active' : ''}" onclick="toggleItem('${s.name}')">
        <div class="item-dot" style="${!selected.includes(s.name) ? `background:${s.color}30;border:1px solid ${s.color}` : ''}"></div>
        <span class="item-sym" style="min-width:90px">${s.name}</span>
        <span class="item-count">${s.count}</span>
      </div>`).join('');
  } else {
    el.innerHTML = items.map(a => `
      <div class="list-item ${selected.includes(a.symbol) ? 'active' : ''}" onclick="toggleItem('${a.symbol}')">
        <div class="item-dot"></div>
        <span class="item-sym">${a.symbol}</span>
        <span class="item-name">${a.name || ''}</span>
      </div>`).join('');
  }
}

function toggleItem(name) {
  if (selected.includes(name)) {
    selected = selected.filter(s => s !== name);
  } else {
    if (selected.length >= 8) selected.shift();
    selected.push(name);
  }
  renderTags();
  renderRPList(document.getElementById('rp-search')?.value?.toLowerCase() || '');
  fetchCurrent();
}

function renderTags() {
  const el = document.getElementById('rp-tags');
  if (!el) return;
  if (!selected.length) {
    el.innerHTML = '<span style="color:var(--muted);font-size:13px">None</span>';
    return;
  }
  el.innerHTML = selected.map((s, i) => {
    const col = activeView?.tab === 'baskets' ? (SECTOR_COLORS[s] || PAL[i%PAL.length]) : PAL[i%PAL.length];
    return `<span class="tag" style="background:${col}">${s}<span class="tag-x" onclick="toggleItem('${s}')">×</span></span>`;
  }).join('');
}

// ── Date helpers ──────────────────────────────────────────────────────────────
function initDates(fromId, toId, days) {
  // Anchor to DB latest date if available, otherwise today
  const to   = dbLatestDate ? new Date(dbLatestDate + 'T00:00:00') : new Date();
  const from = new Date(to);
  if (days > 0) from.setDate(from.getDate() - days);
  else from.setFullYear(2013);
  // Cap hourly at 90 days
  if (granularity === 'hourly') {
    const cap = new Date(to); cap.setDate(cap.getDate() - 90);
    if (from < cap) from.setTime(cap.getTime());
  }
  document.getElementById(toId).value   = to.toISOString().split('T')[0];
  document.getElementById(fromId).value = from.toISOString().split('T')[0];
}

function initPresets() {
  document.querySelectorAll('#rp-presets .preset').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#rp-presets .preset').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      initDates('rp-from', 'rp-to', parseInt(btn.dataset.days));
      fetchCurrent();
    });
  });
  document.getElementById('rp-from')?.addEventListener('change', fetchCurrent);
  document.getElementById('rp-to')?.addEventListener('change', fetchCurrent);
}

function setVersus(v) {
  document.querySelectorAll('.versus-btn').forEach(b => b.classList.toggle('active', b.dataset.v === v));
  fetchCurrent();
}

function setRRGGran(val, btn) {
  btn.closest('.versus-row').querySelectorAll('.versus-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  rrgGran = val;
  fetchCurrent();
}

function setRRGBenchmark(val, btn) {
  btn.closest('.versus-row').querySelectorAll('.versus-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  rrgBenchmark = val;
  fetchCurrent();
}

// ── Y-axis formatter ──────────────────────────────────────────────────────────
function yAxisFormatter(v, isCorr, isMom, isZscore, isMcap) {
  if (isCorr)   return v.toFixed(2);
  if (isZscore) return `${v.toFixed(1)}σ`;
  if (isMom)    return `${v >= 0 ? '+' : ''}${v.toFixed(0)}%`;
  if (isMcap)   { if (v >= 1e9) return `$${(v/1e9).toFixed(0)}B`; if (v >= 1e6) return `$${(v/1e6).toFixed(0)}M`; return `$${v.toFixed(0)}`; }
  const delta = v - 100;
  if (Math.abs(delta) < 200) return `${delta >= 0 ? '+' : ''}${delta.toFixed(0)}%`;
  return `${(v/100).toFixed(1)}x`;
}

// ── Chart ─────────────────────────────────────────────────────────────────────
function getOrMakeChart(isCorr = false, isMom = false, isZscore = false, isMcap = false) {
  if (chart) return chart;
  const tc = darkMode ? '#E8EAE8' : '#606663';
  chart = new Chart(document.getElementById('main-chart'), {
    type: 'line',
    data: { labels: [], datasets: [] },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: { duration: 250 },
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: darkMode ? '#1A1D1B' : '#fff',
          borderColor: darkMode ? '#2A2D2B' : '#E4E4E2',
          borderWidth: 1,
          titleColor: darkMode ? '#E8EAE8' : '#323935',
          bodyColor:  darkMode ? '#888B88' : '#606663',
          padding: 12,
          callbacks: {
            label: ctx => {
              const v = ctx.parsed.y;
              if (v == null)    return ` ${ctx.dataset.label}  —`;
              if (isCorr)       return ` ${ctx.dataset.label}  ${v.toFixed(3)}`;
              if (isZscore)     return ` ${ctx.dataset.label}  ${v.toFixed(2)}σ`;
              if (isMom)        return ` ${ctx.dataset.label}  ${v >= 0 ? '+' : ''}${v.toFixed(1)}%`;
              if (isMcap)       { const f = v >= 1e9 ? `$${(v/1e9).toFixed(1)}B` : v >= 1e6 ? `$${(v/1e6).toFixed(0)}M` : `$${v.toFixed(0)}`; return ` ${ctx.dataset.label}  ${f}`; }
              const delta = v - 100;
              const pct = `${delta >= 0 ? '+' : ''}${delta.toFixed(1)}%`;
              return ` ${ctx.dataset.label}  ${pct}`;
            }
          }
        }
      },
      scales: {
        x: {
          type: 'category', grid: { display: false },
          border: { color: tc, width: 0.8 },
          ticks: {
            color: tc, font: { family: 'DM Mono, monospace', size: 11 },
            maxRotation: 0, maxTicksLimit: 8,
            callback: function(val, idx, ticks) {
              const l = this.getLabelForValue(val);
              if (!l) return '';
              return granularity === 'hourly' ? l.slice(0,10) : l.slice(0,7);
            },
            autoSkip: true,
            autoSkipPadding: 20
          }
        },
        y: {
          grid: (isMom || isZscore || isCorr) ? { color: tc + '22', drawBorder: false, lineWidth: 0.5 } : { display: false },
          border: { color: tc, width: 0.8 },
          ticks: {
            color: tc, font: { family: 'DM Mono, monospace', size: 11 },
            callback: v => yAxisFormatter(v, isCorr, isMom, isZscore, isMcap)
          }
        }
      }
    }
  });
  return chart;
}

function drawChart(data, keys, isCorr = false, isMom = false, isZscore = false, isMcap = false) {
  const firstKey = keys.find(k => data[k]);
  if (!firstKey) return;

  if (chart) { chart.destroy(); chart = null; }
  const c = getOrMakeChart(isCorr, isMom, isZscore, isMcap);
  c.data.labels   = data[firstKey].dates;
  c.data.datasets = keys.filter(k => data[k]).map((k, i) => {
    const isBtcSymbol = k === 'BTC' && activeView?.tab === 'bitcoin';
    const col = isBtcSymbol ? '#F7931A' : (data[k].color || (activeView?.tab === 'baskets' ? SECTOR_COLORS[k] : null) || PAL[i % PAL.length]);
    return {
      label:            k,
      data:             data[k].rebased,
      borderColor:      col,
      backgroundColor:  col + '12',
      borderWidth:      1.8,
      pointRadius:      0,
      pointHoverRadius: 4,
      tension:          0.1,
      fill:             false,
      spanGaps:         true,
    };
  });
  c.update();
}

function updatePerf(data, keys, isCorr = false, isMom = false, isZscore = false, isMcap = false) {
  document.getElementById('perf-row').innerHTML = keys.filter(k => data[k]).map((k, i) => {
    const r    = (data[k].rebased || []).filter(v => v != null);
    const last = r.length ? r[r.length - 1] : null;
    const col  = data[k].color || (activeView?.tab === 'baskets' ? SECTOR_COLORS[k] : null) || PAL[i % PAL.length];
    let valHtml;
    if (isCorr) {
      const cls = last === null ? 'neu' : last >= 0.5 ? 'pos' : last <= -0.2 ? 'neg' : 'neu';
      valHtml = `<span class="perf-val ${cls}">${last !== null ? last.toFixed(3) : '—'}</span>`;
    } else if (isMom) {
      const cls = last === null ? 'neu' : last >= 0 ? 'pos' : 'neg';
      valHtml = `<span class="perf-val ${cls}">${last !== null ? (last >= 0 ? '+' : '') + last.toFixed(1) + '%' : '—'}</span>`;
    } else if (isMcap) {
      const fmt = last === null ? '—' : last >= 1e9 ? `$${(last/1e9).toFixed(1)}B` : last >= 1e6 ? `$${(last/1e6).toFixed(0)}M` : `$${last.toFixed(0)}`;
      valHtml = `<span class="perf-val neu">${fmt}</span>`;
    } else {
      const ret = last !== null ? last - 100 : null;
      const cls = ret === null ? '' : ret >= 0 ? 'pos' : 'neg';
      const fmt = ret !== null ? (Math.abs(ret) >= 200 ? `${(ret/100+1).toFixed(1)}x` : `${ret >= 0 ? '+' : ''}${ret.toFixed(1)}%`) : '—';
      valHtml = `<span class="perf-val ${cls}">${fmt}</span>`;
    }
    return `<div class="perf-item">
      <div class="perf-dot" style="background:${col}"></div>
      <span class="perf-sym">${k}</span>${valHtml}
    </div>`;
  }).join('');
}

// Preload logo for PNG export
const _exportLogo = new Image();
_exportLogo.crossOrigin = 'anonymous';
_exportLogo.src = '/static/logo.png';

document.getElementById('btn-save').addEventListener('click', () => {
  if (!chart) return;

  const showLogo   = document.getElementById('exp-logo')?.checked ?? true;
  const showTitle  = document.getElementById('exp-title')?.checked ?? true;
  const showSource = document.getElementById('exp-source')?.checked ?? true;

  // 12:5 ratio matching matplotlib figsize=(12, 5)
  const W = 2400, H = 1000;
  const PAD = 40;
  const CHART_PAD = 16;
  const HEADER_H = showTitle ? 56 : 16;
  const FOOTER_H = showSource ? 40 : 16;

  const EXP_BG    = '#BEC1BF';
  const EXP_FRAME = '#070B09';
  const EXP_TEXT  = '#070B09';

  // Save originals
  const origDPR = chart.options.devicePixelRatio;
  const origW = chart.canvas.style.width;
  const origH = chart.canvas.style.height;
  const origCW = chart.canvas.width;
  const origCH = chart.canvas.height;

  const origScales = {};
  for (const [id, scale] of Object.entries(chart.options.scales || {})) {
    origScales[id] = {
      tickColor: scale.ticks?.color,
      tickFontSize: scale.ticks?.font?.size,
      borderColor: scale.border?.color,
      borderDisplay: scale.border?.display,
      gridColor: scale.grid?.color,
      gridDisplay: scale.grid?.display,
      gridDrawBorder: scale.grid?.drawBorder,
      titleColor: scale.title?.color,
    };
  }
  const origLegendColor = chart.options.plugins?.legend?.labels?.color;
  const origLegendSize = chart.options.plugins?.legend?.labels?.font?.size;

  // Apply export theme: no gridlines, dark spines, matching matplotlib labelsize=8 (scaled to canvas)
  for (const [id, scale] of Object.entries(chart.options.scales || {})) {
    if (scale.ticks) {
      scale.ticks.color = EXP_FRAME;
      if (!scale.ticks.font) scale.ticks.font = {};
      scale.ticks.font.size = 14;
    }
    if (!scale.border) scale.border = {};
    scale.border.color = EXP_FRAME;
    scale.border.display = true;
    if (scale.grid) {
      scale.grid.color = 'rgba(0,0,0,0)';
      scale.grid.display = false;
      scale.grid.drawBorder = true;
    }
    if (scale.title) scale.title.color = EXP_FRAME;
  }
  if (chart.options.plugins?.legend?.labels) {
    chart.options.plugins.legend.labels.color = EXP_TEXT;
    if (!chart.options.plugins.legend.labels.font) chart.options.plugins.legend.labels.font = {};
    chart.options.plugins.legend.labels.font.size = 14;
  }

  // Resize chart
  const chartAreaW = W - PAD * 2 - CHART_PAD * 2;
  const chartAreaH = H - HEADER_H - FOOTER_H - CHART_PAD * 2;
  chart.options.devicePixelRatio = 1;
  chart.canvas.width = chartAreaW;
  chart.canvas.height = chartAreaH;
  chart.canvas.style.width = chartAreaW + 'px';
  chart.canvas.style.height = chartAreaH + 'px';
  chart.resize(chartAreaW, chartAreaH);
  chart.update();

  // Build export canvas
  const off = document.createElement('canvas');
  off.width = W; off.height = H;
  const ctx = off.getContext('2d');

  // Background
  ctx.fillStyle = EXP_BG;
  ctx.fillRect(0, 0, W, H);

  // Panel frame — spines on all 4 sides, matching matplotlib spine linewidth=0.8 (scaled)
  const fx = PAD, fy = HEADER_H;
  const fw = W - PAD * 2, fh = H - HEADER_H - FOOTER_H;
  ctx.strokeStyle = EXP_FRAME;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(fx, fy, fw, fh);

  // Chart inside panel
  ctx.drawImage(chart.canvas, fx + CHART_PAD, fy + CHART_PAD, chartAreaW, chartAreaH);

  // Logo (top-left, before title)
  if (showLogo && _exportLogo.naturalWidth) {
    const logoH = 36;
    const logoW = (logoH / _exportLogo.naturalHeight) * _exportLogo.naturalWidth;
    try { ctx.drawImage(_exportLogo, PAD, 10, logoW, logoH); } catch(e) {}
  }

  // Title — matplotlib style: fontsize=10, fontweight="normal", pad=10
  // Scaled to 2400px canvas: ~20px, normal weight
  if (showTitle) {
    const title = document.getElementById('chart-title')?.textContent || '';
    ctx.fillStyle = EXP_TEXT;
    ctx.font = '400 22px DM Sans, Helvetica Neue, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(title, W / 2, 36);
    ctx.textAlign = 'left';
  }

  // Source — matplotlib style: fontsize=7, ha="right", va="bottom", alpha=0.6
  // Scaled: ~14px
  if (showSource) {
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const now = new Date();
    const dateFormatted = now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
    ctx.fillStyle = 'rgba(7,11,9,0.6)';
    ctx.font = '400 14px DM Sans, Helvetica Neue, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('Source: Wintermute    Data as of: ' + dateFormatted, W - PAD, H - 12);
    ctx.textAlign = 'left';
  }

  // Download
  const a = document.createElement('a');
  const vk = activeView?.key || 'chart';
  const sel = selected?.join('_') || '';
  const dt = new Date().toISOString().split('T')[0];
  a.download = vk + '_' + sel + '_' + dt + '.png';
  a.href = off.toDataURL('image/png');
  a.click();

  // Restore
  chart.options.devicePixelRatio = origDPR || undefined;
  for (const [id, scale] of Object.entries(chart.options.scales || {})) {
    const orig = origScales[id] || {};
    if (scale.ticks) {
      scale.ticks.color = orig.tickColor;
      if (scale.ticks.font) scale.ticks.font.size = orig.tickFontSize;
    }
    if (scale.border) {
      scale.border.color = orig.borderColor;
      scale.border.display = orig.borderDisplay;
    }
    if (scale.grid) {
      scale.grid.color = orig.gridColor;
      scale.grid.display = orig.gridDisplay;
      scale.grid.drawBorder = orig.gridDrawBorder;
    }
    if (scale.title) scale.title.color = orig.titleColor;
  }
  if (chart.options.plugins?.legend?.labels) {
    chart.options.plugins.legend.labels.color = origLegendColor;
    if (chart.options.plugins.legend.labels.font) chart.options.plugins.legend.labels.font.size = origLegendSize;
  }
  chart.canvas.width = origCW;
  chart.canvas.height = origCH;
  chart.canvas.style.width = origW;
  chart.canvas.style.height = origH;
  chart.resize();
  chart.update();
});

      <thead>
        <tr style="border-bottom:1px solid var(--border)">
          <th style="text-align:left;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;padding:6px 10px">Dataset</th>

          <th style="text-align:left;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;padding:6px 10px">From</th>
          <th style="text-align:left;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;padding:6px 10px">To</th>
          <th style="text-align:right;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;padding:6px 10px">Assets</th>
          <th style="text-align:right;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;padding:6px 10px">Rows</th>
          <th style="text-align:left;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;padding:6px 10px">Last updated</th>
          <th style="text-align:left;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;padding:6px 10px">Status</th>
        </tr>
      </thead>
      <tbody id="dv-body"><tr><td colspan="9" style="padding:20px 10px;color:var(--muted);font-size:13px">Loading…</td></tr></tbody>
    </table>`;
  main.appendChild(dv);

  // Fetch data
  try {
    const res  = await fetch('/api/db-status');
    const data = await res.json();

    const totalRows = data.reduce((s, r) => s + r.rows, 0);
    const earliest  = data.filter(r => r.date_from !== '—').map(r => r.date_from).sort()[0] || '—';
    document.getElementById('dv-tables').textContent   = data.length;
    document.getElementById('dv-rows').textContent     = totalRows >= 1e6 ? (totalRows/1e6).toFixed(1)+'M' : (totalRows/1e3).toFixed(0)+'k';
    document.getElementById('dv-earliest').textContent = earliest.slice(0,4);

    const statusBadge = (s) => {
      if (s === 'live')    return `<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;background:#E6F9EE;color:#0A6E2A"><span style="width:6px;height:6px;border-radius:50%;background:#0A6E2A;display:inline-block"></span>Live</span>`;
      if (s === 'stale')   return `<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;background:#FAEEDA;color:#633806"><span style="width:6px;height:6px;border-radius:50%;background:#633806;display:inline-block"></span>Stale</span>`;
      if (s === 'manual')  return `<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;background:#F1EFE8;color:#5F5E5A"><span style="width:6px;height:6px;border-radius:50%;background:#5F5E5A;display:inline-block"></span>Manual</span>`;
      return `<span style="font-size:11px;color:var(--muted)">${s}</span>`;
    };

    const fmtRows = (n) => n >= 1e6 ? (n/1e6).toFixed(2)+'M' : n >= 1e3 ? (n/1e3).toFixed(0)+'k' : n;

    document.getElementById('dv-body').innerHTML = data.map(r => `
      <tr style="border-bottom:0.5px solid var(--border)">
        <td style="padding:9px 10px;font-weight:500">${r.label}</td>
        <td style="padding:9px 10px;font-family:var(--mono);font-size:12px;color:var(--muted)">${r.granularity}</td>
        <td style="padding:9px 10px;font-family:var(--mono);font-size:12px;color:var(--muted)">${r.source}</td>
        <td style="padding:9px 10px;font-family:var(--mono);font-size:12px;color:var(--muted)">${r.date_from}</td>
        <td style="padding:9px 10px;font-family:var(--mono);font-size:12px;color:var(--muted)">${r.date_to}</td>
        <td style="padding:9px 10px;text-align:right;font-family:var(--mono);font-size:12px">${r.assets}</td>
        <td style="padding:9px 10px;text-align:right;font-family:var(--mono);font-size:12px">${fmtRows(r.rows)}</td>
        <td style="padding:9px 10px;font-family:var(--mono);font-size:12px;color:var(--muted)">${r.last_updated}</td>
        <td style="padding:9px 10px">${statusBadge(r.status)}</td>
      </tr>`).join('');
  } catch(e) {
    document.getElementById('dv-body').innerHTML = `<tr><td colspan="9" style="padding:20px 10px;color:var(--muted)">Error loading data status</td></tr>`;
  }
}

async function fetchTradFi(asset, perfWin, corrWin, smoothWin, from, to) {
  if (chart) { chart.destroy(); chart = null; }
  document.getElementById('chart-empty').style.display = 'none';
  document.getElementById('chart-spin').classList.add('on');

  const ASSET_LABELS = {
    'QQQ':'Nasdaq','SPY':'S&P 500','IWM':'Russell 2k',
    'GLD':'Gold','BNO':'Brent Oil','DX-Y.NYB':'DXY',
    '^VIX':'VIX','TLT':'US 20Y Bond'
  };
  const assetLabel = ASSET_LABELS[asset] || asset;
  const tc = darkMode ? '#E8EAE8' : '#606663';

  try {
    const url = `/api/btc-tradfi?asset=${encodeURIComponent(asset)}&perf_win=${perfWin}&corr_win=${corrWin}&smooth_win=${smoothWin}&from=${from}&to=${to}`;
    const res  = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const dates      = data.dates;
    const btcPerf    = data.btc_perf;
    const assetPerf  = data.asset_perf;
    const corr       = data.corr;
    const corrSmooth = data.corr_smooth;

    // Build two-panel chart using Chart.js with custom plugin
    const canvas = document.getElementById('main-chart');
    const ctx    = canvas.getContext('2d');
    const W = canvas.offsetWidth, H = canvas.offsetHeight;

    // Use Chart.js with two y-axes on same chart as workaround
    // Top 45% = performance, bottom 55% = correlation
    chart = new Chart(canvas, {
      type: 'line',
      data: {
        labels: dates,
        datasets: [
          {
            label: `BTC ${perfWin}d return`,
            data: btcPerf,
            borderColor: '#00D64A',
            backgroundColor: 'transparent',
            borderWidth: 1.4,
            pointRadius: 0,
            yAxisID: 'yPerf',
            spanGaps: true,
            order: 1,
          },
          {
            label: `${assetLabel} ${perfWin}d return`,
            data: assetPerf,
            borderColor: '#2471CC',
            backgroundColor: 'transparent',
            borderWidth: 1.4,
            pointRadius: 0,
            yAxisID: 'yPerf',
            spanGaps: true,
            order: 2,
          },
          {
            label: `${corrWin}d correlation`,
            data: corr,
            borderColor: '#323935',
            backgroundColor: 'transparent',
            borderWidth: 1.4,
            pointRadius: 0,
            yAxisID: 'yCorr',
            spanGaps: true,
            order: 3,
          },
          {
            label: `${smoothWin}d avg`,
            data: corrSmooth,
            borderColor: '#606663',
            backgroundColor: 'transparent',
            borderWidth: 1,
            borderDash: [4, 3],
            pointRadius: 0,
            yAxisID: 'yCorr',
            spanGaps: true,
            order: 4,
          },
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 300 },
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: darkMode ? '#1A1D1B' : '#fff',
            borderColor: darkMode ? '#2A2D2B' : '#E4E4E2',
            borderWidth: 1,
            titleColor: darkMode ? '#E8EAE8' : '#323935',
            bodyColor:  darkMode ? '#888B88' : '#606663',
            padding: 12,
            filter: item => item.parsed.y !== null,
            callbacks: {
              label: ctx => {
                const v = ctx.parsed.y;
                if (v == null) return null;
                if (ctx.dataset.yAxisID === 'yPerf') return ` ${ctx.dataset.label}  ${v >= 0 ? '+' : ''}${v.toFixed(1)}%`;
                return ` ${ctx.dataset.label}  ${v.toFixed(3)}`;
              }
            }
          },
          // Draw dividing line between panels
          panelDivider: {
            afterDraw(chart) {
              const yPerf = chart.scales.yPerf;
              const yCorr = chart.scales.yCorr;
              if (!yPerf || !yCorr) return;
              const ctx   = chart.ctx;
              const mid   = (yPerf.bottom + yCorr.top) / 2;
              ctx.save();
              ctx.strokeStyle = tc;
              ctx.lineWidth   = 0.5;
              ctx.setLineDash([]);
              ctx.beginPath();
              ctx.moveTo(chart.chartArea.left,  mid);
              ctx.lineTo(chart.chartArea.right, mid);
              ctx.stroke();
              // Zero lines
              const zeroPerf = yPerf.getPixelForValue(0);
              const zeroCorr = yCorr.getPixelForValue(0);
              ctx.strokeStyle = tc + '66';
              ctx.lineWidth   = 0.5;
              ctx.setLineDash([4, 4]);
              [zeroPerf, zeroCorr].forEach(y => {
                ctx.beginPath();
                ctx.moveTo(chart.chartArea.left,  y);
                ctx.lineTo(chart.chartArea.right, y);
                ctx.stroke();
              });
              // Panel labels
              ctx.setLineDash([]);
              ctx.fillStyle = tc;
              ctx.font      = '400 11px DM Mono, monospace';
              ctx.fillText(`BTC vs ${assetLabel} · ${perfWin}d return`, chart.chartArea.left + 8, yPerf.top + 16);
              ctx.fillText(`${corrWin}d rolling correlation`, chart.chartArea.left + 8, yCorr.top + 16);
              ctx.restore();
            }
          }
        },
        scales: {
          x: {
            type: 'category',
            grid: { display: false },
            border: { color: tc, width: 0.8 },
            ticks: {
              color: tc, font: { family: 'DM Mono, monospace', size: 11 },
              maxRotation: 0, maxTicksLimit: 8,
              callback: function(val) { const l = this.getLabelForValue(val); return l ? l.slice(0,7) : ''; }
            }
          },
          yPerf: {
            type: 'linear',
            position: 'left',
            weight: 1,
            grid: { display: false },
            border: { color: tc, width: 0.8 },
            ticks: {
              color: tc, font: { family: 'DM Mono, monospace', size: 11 },
              callback: v => `${v >= 0 ? '+' : ''}${v.toFixed(0)}%`
            }
          },
          yCorr: {
            type: 'linear',
            position: 'left',
            weight: 2,
            min: -1.05, max: 1.05,
            grid: { display: false },
            border: { color: tc, width: 0.8 },
            ticks: {
              color: tc, font: { family: 'DM Mono, monospace', size: 11 },
              callback: v => v.toFixed(2),
              stepSize: 0.25,
            }
          }
        }
      },
      plugins: [{ id: 'panelDivider', afterDraw(chart) {
        const yPerf = chart.scales.yPerf;
        const yCorr = chart.scales.yCorr;
        if (!yPerf || !yCorr) return;
        const ctx  = chart.ctx;
        const mid  = (yPerf.bottom + yCorr.top) / 2;
        ctx.save();
        ctx.strokeStyle = tc; ctx.lineWidth = 0.5; ctx.setLineDash([]);
        ctx.beginPath(); ctx.moveTo(chart.chartArea.left, mid); ctx.lineTo(chart.chartArea.right, mid); ctx.stroke();
        const zeroPerf = yPerf.getPixelForValue(0);
        const zeroCorr = yCorr.getPixelForValue(0);
        ctx.strokeStyle = tc + '66'; ctx.lineWidth = 0.5; ctx.setLineDash([4,4]);
        [zeroPerf, zeroCorr].forEach(y => { ctx.beginPath(); ctx.moveTo(chart.chartArea.left, y); ctx.lineTo(chart.chartArea.right, y); ctx.stroke(); });
        ctx.setLineDash([]);
        ctx.fillStyle = tc; ctx.font = '400 11px DM Mono, monospace';
        ctx.fillText('Rolling return', chart.chartArea.left + 8, yPerf.top + 14);
        ctx.fillText('Rolling correlation', chart.chartArea.left + 8, yCorr.top + 14);
        ctx.restore();
      }}]
    });

    // Perf row
    const lastCorr = corr.filter(v => v !== null).pop();
    const cls = lastCorr === null ? 'neu' : lastCorr >= 0.5 ? 'pos' : lastCorr <= -0.2 ? 'neg' : 'neu';
    document.getElementById('perf-row').innerHTML = `
      <div class="perf-item"><div class="perf-dot" style="background:#00D64A"></div><span class="perf-sym">BTC</span></div>
      <div class="perf-item"><div class="perf-dot" style="background:#2471CC"></div><span class="perf-sym">${assetLabel}</span></div>
      <div class="perf-item" style="margin-left:12px"><span style="font-size:12px;color:var(--muted)">Corr (latest):</span></div>
      <div class="perf-item"><span class="perf-val ${cls}">${lastCorr !== null ? lastCorr.toFixed(3) : '—'}</span></div>`;

    document.getElementById('chart-title').textContent = `BTC vs ${assetLabel}`;

  } catch(e) {
    document.getElementById('chart-empty').style.display = 'flex';
    document.getElementById('empty-msg').textContent = `Error: ${e.message}`;
  } finally {
    document.getElementById('chart-spin').classList.remove('on');
  }
}

async function fetchBtcChart(type, from, to, windowDays) {
  if (chart) { chart.destroy(); chart = null; }
  document.getElementById('chart-empty').style.display = 'none';
  document.getElementById('chart-spin').classList.add('on');

  const COLORS = { "Epoch 3 (2016)": "#00D64A", "Epoch 4 (2020)": "#2471CC", "Epoch 5 (2024)": "#746BE6",
                   "2017/18 Bear": "#00D64A", "2021/22 Bear": "#2471CC", "2025 Bear (ongoing)": "#746BE6" };

  try {
    const days = windowDays || (type === 'epochs' ? 1400 : 1000);
    const url  = type === 'epochs'
      ? `/api/btc-epochs?days=${days}`
      : `/api/btc-cycles?days=${days}`;

    const res  = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const labels = Object.keys(data);
    if (!labels.length) throw new Error('no data');

    const tc = darkMode ? '#E8EAE8' : '#606663';

    const datasets = labels.map(label => ({
      label,
      data:             data[label].values,
      borderColor:      COLORS[label] || '#888',
      backgroundColor:  'transparent',
      borderWidth:      label.includes('ongoing') || label.includes('2024') ? 1.8 : 1.2,
      pointRadius:      0,
      pointHoverRadius: 4,
      tension:          0.1,
      fill:             false,
      spanGaps:         true,
    }));

    // All epochs/cycles share the same day-based x axis
    const maxDays  = Math.max(...labels.filter(l => data[l]?.days?.length).map(l => data[l].days[data[l].days.length - 1]));
    const allDays  = Array.from({length: maxDays + 1}, (_, i) => i);

    // Add 1x reference line for epochs chart only (after allDays is defined)
    if (type === 'epochs') {
      datasets.push({
        label:           '1x (halving price)',
        data:            allDays.map(() => 1),
        borderColor:     darkMode ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.2)',
        backgroundColor: 'transparent',
        borderWidth:     1,
        borderDash:      [4, 4],
        pointRadius:     0,
        pointHoverRadius:0,
        tension:         0,
        fill:            false,
        spanGaps:        true,
      });
    }

    // Align values to full day array
    const validLabels = labels.filter(l => data[l]?.days?.length && data[l]?.values?.length);
    if (!validLabels.length) throw new Error('no data returned from API');
    const alignedDatasets = datasets.filter((ds, i) => data[labels[i]]?.days?.length).map((ds, i) => {
      const li = labels.indexOf(ds.label);
      const label  = ds.label;
      const daysArr = data[label]?.days || [];
      const valsArr = data[label]?.values || [];
      const map    = {};
      daysArr.forEach((d, j) => map[d] = valsArr[j]);
      return { ...ds, data: allDays.map(d => map[d] !== undefined ? map[d] : null) };
    });

    const isLog = type === 'epochs';

    chart = new Chart(document.getElementById('main-chart'), {
      type: 'line',
      data: { labels: allDays, datasets: alignedDatasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: { duration: 300 },
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: darkMode ? '#1A1D1B' : '#fff',
            borderColor: darkMode ? '#2A2D2B' : '#E4E4E2',
            borderWidth: 1,
            titleColor: darkMode ? '#E8EAE8' : '#323935',
            bodyColor:  darkMode ? '#888B88' : '#606663',
            padding: 12,
            callbacks: {
              title: ctx => `Day ${ctx[0].label}`,
              filter: item => item.dataset.label !== '1x (halving price)',
              label: ctx => {
                const v = ctx.parsed.y;
                if (v == null) return ` ${ctx.dataset.label}  —`;
                return type === 'epochs'
                  ? ` ${ctx.dataset.label}  ${v.toFixed(2)}x`
                  : ` ${ctx.dataset.label}  ${v.toFixed(1)}`;
              }
            }
          }
        },
        scales: {
          x: {
            type: 'category',
            grid: { display: false },
            border: { color: tc, width: 0.8 },
            ticks: {
              color: tc, font: { family: 'DM Mono, monospace', size: 11 },
              maxRotation: 0, maxTicksLimit: 10,
              callback: (val, idx) => allDays[idx] % 200 === 0 ? `d${allDays[idx]}` : ''
            }
          },
          y: {
            type: isLog ? 'logarithmic' : 'linear',
            grid: { display: false },
            border: { color: tc, width: 0.8 },
            ticks: {
              color: tc, font: { family: 'DM Mono, monospace', size: 11 },
              callback: v => isLog ? `${v}x` : `${v.toFixed(0)}`
            }
          }
        }
      }
    });

    // Perf row
    document.getElementById('perf-row').innerHTML = labels.map(label => {
      const vals = data[label].values.filter(v => v != null);
      const last = vals[vals.length - 1];
      const col  = COLORS[label] || '#888';
      const fmt  = type === 'epochs'
        ? `${last ? last.toFixed(2) + 'x' : '—'}`
        : `${last ? last.toFixed(1) : '—'}`;
      return `<div class="perf-item">
        <div class="perf-dot" style="background:${col}"></div>
        <span class="perf-sym">${label}</span>
        <span class="perf-val neu">${fmt}</span>
      </div>`;
    }).join('');

    document.getElementById('chart-title').textContent =
      type === 'epochs' ? 'BTC halving epochs' : 'BTC bear market cycles';

  } catch(e) {
    document.getElementById('chart-empty').style.display = 'flex';
    document.getElementById('empty-msg').textContent = `Error: ${e.message}`;
  } finally {
    document.getElementById('chart-spin').classList.remove('on');
  }
}

async function fetchBubble(from, to, window) {
  // Bubble chart uses Chart.js scatter with bubble type
  if (chart) { chart.destroy(); chart = null; }
  document.getElementById('chart-empty').style.display = 'none';
  document.getElementById('chart-spin').classList.add('on');

  try {
    const res  = await fetch(`/api/sector-bubble?to=${to}&window=${window}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const sectors = Object.keys(data).filter(k => data[k].x !== null && data[k].y !== null);
    if (!sectors.length) throw new Error('no data');

    // Max mcap for bubble sizing
    const maxMcap = Math.max(...sectors.map(k => data[k].mcap || 0));
    const tc = darkMode ? '#E8EAE8' : '#606663';

    chart = new Chart(document.getElementById('main-chart'), {
      type: 'bubble',
      data: {
        datasets: sectors.map(sector => ({
          label: sector,
          data: [{
            x: data[sector].x,
            y: data[sector].y,
            r: maxMcap > 0 ? Math.max(6, Math.sqrt(data[sector].mcap / maxMcap) * 40) : 12,
          }],
          backgroundColor: (data[sector].color || '#888') + 'AA',
          borderColor:     data[sector].color || '#888',
          borderWidth: 1.5,
        }))
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: { duration: 400 },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: darkMode ? '#1A1D1B' : '#fff',
            borderColor: darkMode ? '#2A2D2B' : '#E4E4E2',
            borderWidth: 1,
            titleColor: darkMode ? '#E8EAE8' : '#323935',
            bodyColor:  darkMode ? '#888B88' : '#606663',
            padding: 12,
            callbacks: {
              title: ctx => ctx[0].dataset.label,
              label: ctx => {
                const s = ctx.dataset.label;
                const d = data[s];
                const mcap = d.mcap >= 1e9 ? `$${(d.mcap/1e9).toFixed(1)}B` : `$${(d.mcap/1e6).toFixed(0)}M`;
                return [
                  ` Momentum: ${d.y >= 0 ? '+' : ''}${d.y.toFixed(1)}%`,

          },
          y: {
            title: { display: true, text: `${window}d momentum (%)`, color: tc, font: { family: 'DM Mono, monospace', size: 11 } },
            grid: { display: false },
            border: { color: tc, width: 0.8 },
            ticks: { color: tc, font: { family: 'DM Mono, monospace', size: 11 }, callback: v => `${v >= 0 ? '+' : ''}${v.toFixed(0)}%` }
          }
        }
      }
    });

    // Draw sector labels on bubbles

    chart.update();
    setTimeout(() => {
      const ctx2 = chart.canvas.getContext('2d');
      chart.data.datasets.forEach((ds, i) => {

async function fetchRRG() {
  if (chart) { chart.destroy(); chart = null; }
  document.getElementById('chart-empty').style.display = 'none';
  document.getElementById('chart-spin').classList.add('on');

  try {
    const to      = document.getElementById('rp-rrg-to')?.value  || new Date().toISOString().split('T')[0];
    const rsWin   = document.getElementById('rp-rrg-rs')?.value  || '10';
    const momWin  = document.getElementById('rp-rrg-mom')?.value || '6';
    const tailOn  = document.getElementById('rp-rrg-tail')?.checked;
    const tailLen = document.getElementById('rp-rrg-tail-len')?.value || '6';

    const url = `/api/sector-rrg?to=${to}&window=${rsWin}&momentum=${momWin}&tail=${tailOn ? tailLen : 0}&granularity=${rrgGran}&benchmark=${rrgBenchmark}`;
    const res  = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const sectors = Object.keys(data).filter(k => data[k].x != null && data[k].y != null);
    if (!sectors.length) throw new Error('no data');

    const tc = darkMode ? '#E8EAE8' : '#606663';

    // Axis range centered on 100
    const allX = sectors.map(s => data[s].x);
    const allY = sectors.map(s => data[s].y);
    const xPad = Math.max(3, ...allX.map(v => Math.abs(v - 100))) * 1.4;
    const yPad = Math.max(3, ...allY.map(v => Math.abs(v - 100))) * 1.4;

    // Datasets: tails first (behind), then invisible anchor points for tooltip hit areas
    const datasets = [];

    if (tailOn) {
      sectors.forEach(sector => {
        const d = data[sector];
        if (!d.tail?.length) return;
        const pts   = [...d.tail, {x: d.x, y: d.y}];
        const color = d.color || '#888';
        const r = parseInt(color.slice(1,3),16), g = parseInt(color.slice(3,5),16), b = parseInt(color.slice(5,7),16);
        datasets.push({
          label: `${sector}__tail`,
          data:  pts,
          showLine: true,
          tension: 0.3,
          borderColor: `rgba(${r},${g},${b},0.3)`,
          borderWidth: 1.5,
          backgroundColor: 'transparent',
          pointRadius: pts.map((_, i) => i === pts.length - 1 ? 0 : 2),
          pointBackgroundColor: pts.map((_, i) => `rgba(${r},${g},${b},${0.12 + (i / pts.length) * 0.45})`),
          pointBorderWidth: 0,
          order: 2,
        });
      });
    }

    // Invisible anchor points — used only for tooltip hit detection
    sectors.forEach(sector => {
      const d = data[sector];
      datasets.push({
        label: sector,
        data:  [{x: d.x, y: d.y}],
        backgroundColor: 'transparent',
        borderColor:     'transparent',
        pointRadius: 18,          // large invisible hit area
        pointHoverRadius: 18,
        order: 1,
      });
    });

    // Crosshair + quadrant label plugin (no fills)
    const quadrantPlugin = {
      id: 'rrg-quadrant',
      beforeDraw(ch) {
        const {ctx, chartArea: {left, right, top, bottom}, scales} = ch;
        const cx = scales.x.getPixelForValue(100);
        const cy = scales.y.getPixelForValue(100);
        ctx.save();
        ctx.strokeStyle = darkMode ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.12)';
        ctx.lineWidth = 1; ctx.setLineDash([4,4]);
        ctx.beginPath(); ctx.moveTo(cx,top);  ctx.lineTo(cx,bottom); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(left,cy); ctx.lineTo(right,cy);  ctx.stroke();
        ctx.setLineDash([]);
        ctx.font = '10px DM Mono, monospace';
        ctx.fillStyle = darkMode ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.2)';
        ctx.textBaseline = 'top';
        ctx.textAlign = 'right'; ctx.fillText('IMPROVING', cx-8, top+8);
        ctx.textAlign = 'left';  ctx.fillText('LEADING',   cx+8, top+8);
        ctx.textBaseline = 'bottom';
        ctx.textAlign = 'left';  ctx.fillText('WEAKENING', cx+8, bottom-8);
        ctx.textAlign = 'right'; ctx.fillText('LAGGING',   cx-8, bottom-8);
        ctx.restore();
      },
      // Draw sector names directly on canvas (no dots)
      afterDraw(ch) {
        const {ctx} = ch;
        ctx.save();
        ch.data.datasets.forEach((ds, i) => {
          if (ds.label?.endsWith('__tail')) return;
          const meta = ch.getDatasetMeta(i);
          if (!meta.visible) return;
          const sector = ds.label;
          const d = data[sector];
          if (!d) return;
          const color = d.color || '#888';
          meta.data.forEach(pt => {
            ctx.font = '600 12px DM Sans, sans-serif';
            ctx.fillStyle = color;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(sector, pt.x, pt.y);
          });
        });
        ctx.restore();
      }
    };

    chart = new Chart(document.getElementById('main-chart'), {
      type: 'scatter',
      data: { datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: { duration: 400 },
        interaction: { mode: 'nearest', intersect: false, axis: 'xy' },
        plugins: {
          legend: { display: false },
          tooltip: {
            filter: ctx => !ctx.dataset.label?.endsWith('__tail'),
            backgroundColor: darkMode ? '#1A1D1B' : '#fff',
            borderColor: darkMode ? '#2A2D2B' : '#E4E4E2',
            borderWidth: 1, padding: 12,
            titleColor: darkMode ? '#E8EAE8' : '#323935',
            bodyColor:  darkMode ? '#888B88' : '#606663',
            callbacks: {
              title: ctx => ctx[0]?.dataset.label,
              label: ctx => {
                const d = data[ctx.dataset.label];
                if (!d) return [];
                return [
                  ` RS-Ratio:  ${d.x.toFixed(2)}`,
                  ` RS-Mom:    ${d.y.toFixed(2)}`,
                  ` Quadrant:  ${d.quadrant}`,
                ];
              }
            }
          }
        },
        scales: {
          x: {
            min: 100 - xPad, max: 100 + xPad,
            title: { display: true, text: `← Weak    RS vs ${rrgBenchmark === 'market' ? 'market' : rrgBenchmark.toUpperCase()}    Strong →`, color: tc, font: { family: 'DM Mono, monospace', size: 11 } },
            grid: { display: false },
            border: { color: tc, width: 0.8 },
            ticks: { color: tc, font: { family: 'DM Mono, monospace', size: 11 }, callback: v => v.toFixed(1) }
          },
          y: {
            min: 100 - yPad, max: 100 + yPad,
            title: { display: true, text: '↑ Accelerating    RS Momentum    Decelerating ↓', color: tc, font: { family: 'DM Mono, monospace', size: 11 } },
            grid: { display: false },
            border: { color: tc, width: 0.8 },
            ticks: { color: tc, font: { family: 'DM Mono, monospace', size: 11 }, callback: v => v.toFixed(1) }
          }
        }
      },
      plugins: [quadrantPlugin]
    });

    const qColors = { Leading: '#00D64A', Improving: '#F7931A', Lagging: '#DC3545', Weakening: '#2471CC' };
    document.getElementById('perf-row').innerHTML = sectors.map(s => {
      const d = data[s];
      return `<div class="perf-item">
        <div class="perf-dot" style="background:${d.color}"></div>
        <span class="perf-sym">${s}</span>
        <span class="perf-val" style="color:${qColors[d.quadrant]||'#888'}">${d.quadrant}</span>
      </div>`;
    }).join('');

    document.getElementById('chart-title').textContent = 'Relative Rotation Graph';

    // Methodology info block
    const bmLabel = rrgBenchmark === 'market' ? 'equal-weighted market average' : rrgBenchmark.toUpperCase();
    const infoEl  = document.getElementById('chart-info');
    infoEl.style.display = 'block';
    infoEl.innerHTML = `
      <b>How it's calculated</b><br>
      1. <b>RS ratio</b> — each sector's equal-weighted price index is divided by the ${bmLabel} index to get its relative strength (RS).<br>
      2. <b>RS-Ratio (x-axis)</b> — measures whether the sector is currently outperforming: <code>100 + ((RS_now / RS_${rsWin}${rrgGran === 'weekly' ? ' weeks' : ' days'}_ago) − 1) × 100</code>. Above 100 = outperforming.<br>
      3. <b>RS-Momentum (y-axis)</b> — measures whether that outperformance is accelerating: <code>100 + ((RS-Ratio_now / RS-Ratio_${momWin}${rrgGran === 'weekly' ? ' weeks' : ' days'}_ago) − 1) × 100</code>. Above 100 = accelerating.<br>
      4. <b>Quadrants</b> — Leading (strong & accelerating) → Weakening (strong but slowing) → Lagging (weak & decelerating) → Improving (weak but accelerating). Sectors rotate clockwise over time.<br>
      ${tailOn ? `5. <b>Trail</b> — the fading line behind each sector shows its last ${tailLen} ${rrgGran === 'weekly' ? 'weekly' : 'daily'} positions, giving a sense of direction and speed of rotation.<br>` : ''}
      <span style="opacity:0.6">Lookback: RS = ${rsWin} ${rrgGran} periods · Momentum = ${momWin} ${rrgGran} periods · Benchmark = ${bmLabel} · As of ${to}</span>`;

  } catch(e) {
    document.getElementById('chart-empty').style.display = 'flex';
    document.getElementById('empty-msg').textContent = `Error: ${e.message}`;
  } finally {
    document.getElementById('chart-spin').classList.remove('on');
  }
}

          }

          ctx2.beginPath(); ctx2.moveTo(xAxis.left, myPx);   ctx2.lineTo(xAxis.right, myPx);  ctx2.stroke();

          const qc = darkMode ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.15)';

          ctx2.textAlign = 'left';
          ctx2.fillText('outperform · high vol',   xAxis.right - 4,   yAxis.top + 6);
